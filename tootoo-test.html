<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="revised" content="2026-04-25 14:30">
  <title>TooToo Tests</title>
  <style>
    :root {
      --pass: #1a7f37;
      --fail: #cf222e;
      --bg: #f6f8fa;
      --border: #d0d7de;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1f2328;
    }
    h1 { margin-top: 0; }
    .summary {
      padding: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    .summary.all-pass { border-color: var(--pass); }
    .summary.has-fail { border-color: var(--fail); }
    .group { margin-bottom: 1.5rem; }
    .group h2 { font-size: 1rem; margin-bottom: 0.5rem; }
    details {
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 0.25rem;
      padding: 0.5rem 0.75rem;
      background: white;
    }
    details.fail { border-color: var(--fail); background: #fff5f5; }
    details.pass { border-color: var(--pass); }
    summary { cursor: pointer; font-family: var(--mono); font-size: 0.9rem; }
    .pass summary::before { content: "✅ "; }
    .fail summary::before { content: "❌ "; }
    pre {
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      overflow-x: auto;
      margin: 0.5rem 0 0;
    }
    .label { font-weight: 600; font-size: 0.8rem; color: #57606a; }
    code { font-family: var(--mono); }
    footer { margin-top: 2rem; font-size: 0.85rem; color: #57606a; }
  </style>

  <!-- Tests load the same helpers file the app loads. No copy/paste, no drift. -->
  <script src="tootoo-helpers.js"></script>
</head>
<body>
  <h1>🧪 TooToo Tests</h1>
  <p>Test harness for the pure helpers in <a href="tootoo-helpers.js"><code>tootoo-helpers.js</code></a> — the same module loaded by <a href="index.html">index.html</a>. Open this file directly via <code>file://</code> — no server needed.</p>

  <div id="summary" class="summary">Running…</div>
  <div id="results"></div>

  <footer>
    Helpers under test are imported from <code>tootoo-helpers.js</code>, so what you test here is what the app actually runs.
  </footer>

  <script>
    /* ── Tiny test runner ── */
    const tests = [];
    const test = ( group, name, fn ) => tests.push( { group, name, fn } );
    const assertEqual = ( actual, expected ) => {
      const a = JSON.stringify( actual );
      const e = JSON.stringify( expected );
      if ( a !== e ) throw { actual: a, expected: e };
    };

    /* ── 1. resolveRepoPath ── */
    test( 'resolveRepoPath', 'simple relative from root', () => {
      assertEqual( resolveRepoPath( 'foo.md', '' ), 'foo.md' );
    } );
    test( 'resolveRepoPath', 'relative joined to currentDir', () => {
      assertEqual( resolveRepoPath( 'img.png', 'docs/assets' ), 'docs/assets/img.png' );
    } );
    test( 'resolveRepoPath', 'root-relative ignores currentDir', () => {
      assertEqual( resolveRepoPath( '/README.md', 'docs/assets' ), 'README.md' );
    } );
    test( 'resolveRepoPath', '../ pops a segment', () => {
      assertEqual( resolveRepoPath( '../img.png', 'docs/assets' ), 'docs/img.png' );
    } );
    test( 'resolveRepoPath', '../../ pops two segments', () => {
      assertEqual( resolveRepoPath( '../../img.png', 'docs/assets' ), 'img.png' );
    } );
    test( 'resolveRepoPath', './ is a no-op', () => {
      assertEqual( resolveRepoPath( './foo.md', 'docs' ), 'docs/foo.md' );
    } );
    test( 'resolveRepoPath', 'collapses double slashes', () => {
      assertEqual( resolveRepoPath( 'a//b/c.md', '' ), 'a/b/c.md' );
    } );
    test( 'resolveRepoPath', 'pops past root safely', () => {
      // In repo terms, `../` from root should just stay at root (no error)
      assertEqual( resolveRepoPath( '../foo', '' ), 'foo' );
    } );
    test( 'resolveRepoPath', 'currentDir defaults to root when omitted', () => {
      assertEqual( resolveRepoPath( 'foo.md' ), 'foo.md' );
    } );

    /* ── 2. escapeHTML ── */
    test( 'escapeHTML', 'escapes < > & " \'', () => {
      assertEqual( escapeHTML( `<a href="x">'&'</a>` ), '&lt;a href=&quot;x&quot;&gt;&#39;&amp;&#39;&lt;/a&gt;' );
    } );
    test( 'escapeHTML', 'plain text passes through', () => {
      assertEqual( escapeHTML( RATE_LIMIT_MESSAGE ), RATE_LIMIT_MESSAGE );
    } );
    test( 'escapeHTML', 'numbers and undefined survive', () => {
      assertEqual( escapeHTML( 42 ), '42' );
      assertEqual( escapeHTML( undefined ), 'undefined' );
    } );

    /* ── 3. encodePath ── */
    test( 'encodePath', 'encodes each segment but keeps slashes', () => {
      assertEqual( encodePath( 'docs/my file.md' ), 'docs/my%20file.md' );
    } );
    test( 'encodePath', 'encodes special chars', () => {
      assertEqual( encodePath( 'a/b?c.md' ), 'a/b%3Fc.md' );
    } );
    test( 'encodePath', 'preserves nested paths', () => {
      assertEqual( encodePath( 'a/b/c/d.md' ), 'a/b/c/d.md' );
    } );

    /* ── 4. RATE_LIMIT_MESSAGE constant ── */
    test( 'RATE_LIMIT_MESSAGE', 'is a non-empty string', () => {
      if ( typeof RATE_LIMIT_MESSAGE !== 'string' || RATE_LIMIT_MESSAGE.length === 0 ) {
        throw { actual: typeof RATE_LIMIT_MESSAGE, expected: 'non-empty string' };
      }
    } );
    test( 'RATE_LIMIT_MESSAGE', 'mentions token', () => {
      if ( !/token/i.test( RATE_LIMIT_MESSAGE ) ) {
        throw { actual: RATE_LIMIT_MESSAGE, expected: 'string containing "token"' };
      }
    } );

    /* ── Run ── */
    const run = () => {
      const results = document.getElementById( 'results' );
      const groups = {};
      let passed = 0, failed = 0;

      tests.forEach( ( t ) => {
        let ok = true, info = null;
        try { t.fn(); } catch ( err ) { ok = false; info = err; }
        if ( ok ) passed++; else failed++;

        if ( !groups[ t.group ] ) {
          const wrap = document.createElement( 'div' );
          wrap.className = 'group';
          wrap.innerHTML = `<h2>${ escapeHTML( t.group ) }</h2>`;
          results.appendChild( wrap );
          groups[ t.group ] = wrap;
        }

        const det = document.createElement( 'details' );
        det.className = ok ? 'pass' : 'fail';
        if ( !ok ) det.open = true;
        const sum = document.createElement( 'summary' );
        sum.textContent = t.name;
        det.appendChild( sum );
        if ( !ok && info ) {
          const body = document.createElement( 'div' );
          body.innerHTML =
            `<div class="label">expected</div><pre>${ escapeHTML( info.expected ?? '(threw)' ) }</pre>` +
            `<div class="label">actual</div><pre>${ escapeHTML( info.actual ?? String( info.message || info ) ) }</pre>`;
          det.appendChild( body );
        }
        groups[ t.group ].appendChild( det );
      } );

      const summary = document.getElementById( 'summary' );
      summary.textContent = `${ passed } passed · ${ failed } failed · ${ tests.length } total`;
      summary.classList.add( failed === 0 ? 'all-pass' : 'has-fail' );
    };

    run();
  </script>
</body>
</html>
