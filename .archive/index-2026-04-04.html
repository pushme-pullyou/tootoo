<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TooToo GitHub Browser</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --primary-bg: #f6f8fa;
      --secondary-bg: #ffffff;
      --text-color: #24292f;
      --border-color: #d0d7de;
      --highlight-color: #0969da;
      --hover-bg: #f3f4f6;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      background-color: var(--primary-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 1rem;
      background-color: var(--secondary-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    input {
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      padding: 0.5rem 1rem;
      background-color: var(--highlight-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.9;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width, 250px);
      flex-shrink: 0;
      background-color: var(--secondary-bg);
      padding: 0.5rem 0.5rem 1rem 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .resizer {
      width: 8px;
      cursor: col-resize;
      background-color: var(--border-color);
      flex-shrink: 0;
      z-index: 10;
      transition: background-color 0.2s;
      touch-action: none;
    }

    .resizer:hover,
    .resizer.resizing {
      background-color: var(--highlight-color);
    }

    .content-area {
      flex: 1;
      min-width: 0;
      padding: 1rem;
      overflow-y: auto;
      overflow-x: auto;
      background-color: var(--primary-bg);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 0.1rem 0;
    }

    .repo-item {
      cursor: pointer;
      color: var(--highlight-color);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .repo-item:hover {
      background-color: var(--hover-bg);
      text-decoration: underline;
    }

    .repo-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.7rem;
      color: #57606a;
      margin-top: 0.05rem;
      line-height: 1.2;
      font-family: var(--font-family);
    }

    .repo-lang-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tree-item {
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: monospace;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .tree-item-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-item-size {
      opacity: 0.65;
      flex-shrink: 0;
      text-align: right;
    }

    .tree-item:hover {
      background-color: var(--hover-bg);
    }

    .tree-folder {
      cursor: pointer;
      padding: 0.2rem;
      border-radius: 4px;
      font-weight: bold;
      font-family: monospace;
      user-select: none;
    }

    .tree-folder:hover {
      background-color: var(--hover-bg);
    }

    .tree-children {
      margin-left: 1rem;
    }

    #navTree {
      display: none;
    }

    pre {
      background-color: var(--secondary-bg);
      padding: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      overflow-x: auto;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .error {
      color: #cf222e;
      padding: 1rem;
    }

    .file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--primary-bg);
    }

    .file-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .file-title-path {
      opacity: 0.7;
      font-weight: normal;
    }

    .file-source-link {
      color: var(--text-color);
      text-decoration: none;
      opacity: 0.7;
      transform: translateY(2px);
    }

    .file-source-link:hover {
      color: var(--highlight-color);
    }

    .file-actions {
      display: flex;
      gap: 0.5rem;
    }

    .file-btn {
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
    }

    .markdown-body {
      padding: 1.5rem;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      line-height: 1.5;
      overflow-x: auto;
    }

    .md-error {
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      border-radius: 4px;
    }

    .media-content {
      max-width: 100%;
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }

    .iframe-content {
      width: 100%;
      height: 80vh;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--secondary-bg);
    }
  </style>
</head>

<body>

  <header>
    <strong style="cursor: pointer;"
      onclick="history.replaceState(null, '', location.pathname + location.search); location.reload();"
      title="Reload TooToo">TooToo</strong>
    <input type="text" id="ownerInput" placeholder="Enter user or org name" autocomplete="off"
      oninput="resetMainAction()" onfocus="this.value=''" onchange="handleFetchRepos()" list="recentUsers" />
    <datalist id="recentUsers"></datalist>
    <button
      onclick="window.open('https://github.com/' + document.getElementById('ownerInput').value.trim(), '_blank', 'noopener')"
      title="Open user's GitHub profile"
      style="background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 0.4rem; display: flex; align-items: center; justify-content: center;">
      <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
        <path
          d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
        </path>
      </svg>
    </button>
    <button id="btnMainAction" onclick="handleFetchRepos()">Get Repos</button>
    <button id="btnGetOrgs" onclick="handleFetchOrgs()">Get Orgs</button>
    <button id="btnGetGists" onclick="handleFetchGists()">Get Gists</button>
    <button id="btnStats" onclick="handleFetchStats()">Stats</button>
    <button id="btnDiscover" onclick="handleDiscover()"
      style="background: var(--text-color); color: var(--primary-bg);">🌍 Discover</button>
    <button id="btnToggleFolders" onclick="toggleAllFolders()" style="display: none;">Expand All</button>
    <button onclick="promptForToken()"
      style="margin-left: auto; background: var(--secondary-bg); color: var(--text-color); border: 1px solid var(--border-color);">⚙️
      Token</button>
  </header>

  <main>
    <div class="sidebar">
      <div id="repoListContainer">
        <h3 style="margin: 0 0 0.35rem 0; font-size: 0.95rem;">Repositories</h3>
        <input type="text" id="filterInput" placeholder="Filter items..." oninput="filterList()"
          style="width: 100%; box-sizing: border-box; margin-bottom: 0.25rem; padding: 0.3rem 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.9rem;" />
        <select id="sortSelect" onchange="sortRepoList()"
          style="width: 100%; box-sizing: border-box; margin-bottom: 0.25rem; padding: 0.25rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.8rem; display: none;">
          <option value="updated">Sort: Recently Updated</option>
          <option value="stars">Sort: Stars</option>
          <option value="name">Sort: Name</option>
          <option value="pushed">Sort: Last Push</option>
          <option value="size">Sort: Size</option>
        </select>
        <ul id="repoList"></ul>
      </div>
      <div id="navTree">
        <h3 style="margin: 0 0 0.35rem 0; font-size: 0.95rem;">Files</h3>
        <div id="treeTruncatedWarning"
          style="display:none; padding: 0.5rem; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; font-size: 0.85rem; border-radius: 4px; margin-top: 0.5rem;">
          ⚠️ Repository too large. Tree truncated.</div>
        <div style="margin-top: 1rem;" id="treeList"></div>
      </div>
    </div>

    <div class="resizer" id="dragMe"></div>

    <div class="content-area" id="mainContent">
      <p>Select a user/organization and click "Get Repos" to begin.</p>
    </div>
  </main>

  <script>
    // ── Security helpers (defined first — used throughout) ──────────────────

    const escapeHTML = str => String( str ).replace( /[&<>'"]/g, tag => ( {
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    } )[ tag ] );

    const escapeAttribute = escapeHTML;

    // ── CONFIG (only values that differ between copies) ───────────────────

    const CONFIG = {
      owner: 'theo-armour',
      repo: 'sandbox',
      branch: 'main',
      localRepo: ''
    };

    // ── Application state ───────────────────────────────────────────────────

    const state = {
      owner: '',
      repo: '',
      branch: 'main',
      tree: [],
      isGist: false,
      currentFilePath: '',
      repoItems: [],
      repoRenderer: null
    };

    const ghToken = localStorage.getItem( 'githubToken' ) || '';
    const headers = ghToken ? { Authorization: `token ${ ghToken }` } : {};
    const LARGE_FILE_WARNING_BYTES = 1024 * 1024;
    const approvedLargeFiles = new Set();

    const languageColors = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Java: '#b07219',
      'C++': '#f34b7d', C: '#555555', 'C#': '#178600', Go: '#00ADD8', Rust: '#dea584',
      Ruby: '#701516', PHP: '#4F5D95', Swift: '#F05138', Kotlin: '#A97BFF', Dart: '#00B4AB',
      Shell: '#89e051', HTML: '#e34c26', CSS: '#563d7c', SCSS: '#c6538c', Vue: '#41b883',
      Svelte: '#ff3e00', Lua: '#000080', R: '#198CE7', Jupyter: '#DA5B0B', Dockerfile: '#384d54',
      Makefile: '#427819', Elixir: '#6e4a7e', Haskell: '#5e5086', Scala: '#c22d40',
      Perl: '#0298c3', Zig: '#ec915c', Nim: '#ffc200', OCaml: '#3be133'
    };

    let mainAbortController = null;
    const getFetchOptions = ( reset = false ) => {
      if ( reset ) {
        if ( mainAbortController ) mainAbortController.abort();
        mainAbortController = new AbortController();
      }
      return { headers, signal: mainAbortController?.signal };
    };

    // ── DOM references ──────────────────────────────────────────────────────

    const ownerInput = document.getElementById( 'ownerInput' );
    const repoList = document.getElementById( 'repoList' );
    const repoListContainer = document.getElementById( 'repoListContainer' );
    const navTree = document.getElementById( 'navTree' );
    const treeList = document.getElementById( 'treeList' );
    const mainContent = document.getElementById( 'mainContent' );
    const btnMainAction = document.getElementById( 'btnMainAction' );
    const btnToggleFolders = document.getElementById( 'btnToggleFolders' );
    const recentUsersDataList = document.getElementById( 'recentUsers' );

    // ── Utilities ───────────────────────────────────────────────────────────

    const formatFileSize = bytes => {
      if ( bytes == null || Number.isNaN( bytes ) ) return '';
      if ( bytes < 1024 ) return `${ bytes } B`;
      if ( bytes < 1024 * 1024 ) return `${ ( bytes / 1024 ).toFixed( 1 ) } KB`;
      return `${ ( bytes / ( 1024 * 1024 ) ).toFixed( 1 ) } MB`;
    };

    const getKnownFileSize = fileNode => {
      if ( fileNode?.size != null ) return fileNode.size;
      if ( fileNode?.fileNode?.size != null ) return fileNode.fileNode.size;
      return null;
    };

    const getLargeFileApprovalKey = path => `${ state.owner }/${ state.repo }/${ state.branch }/${ path }`;

    const confirmLargeFileLoad = ( path, size ) => {
      if ( size == null || size < LARGE_FILE_WARNING_BYTES ) return true;
      const key = getLargeFileApprovalKey( path );
      if ( approvedLargeFiles.has( key ) ) return true;
      const ok = window.confirm( `This file is ${ formatFileSize( size ) } and may take a while to load.\n\nLoad ${ path }?` );
      if ( ok ) approvedLargeFiles.add( key );
      return ok;
    };

    // ── Recent users ────────────────────────────────────────────────────────

    const updateRecentUsers = newUser => {
      let users = JSON.parse( localStorage.getItem( 'tootooRecentUsers' ) || '[]' );
      if ( newUser ) {
        users = [ newUser, ...users.filter( u => u !== newUser ) ].slice( 0, 10 );
        localStorage.setItem( 'tootooRecentUsers', JSON.stringify( users ) );
      }
      recentUsersDataList.innerHTML = users.map( u =>
        `<option value="${ escapeAttribute( u ) }">${ escapeAttribute( u ) }</option>`
      ).join( '' );
    };

    // ── Token ───────────────────────────────────────────────────────────────

    const promptForToken = () => {
      const newToken = prompt( 'Enter GitHub Personal Access Token (for higher rate limits):\nLeave blank to clear.', ghToken );
      if ( newToken !== null ) {
        localStorage.setItem( 'githubToken', newToken.trim() );
        location.reload();
      }
    };

    // ── Hash routing ────────────────────────────────────────────────────────

    const updateHash = () => {
      let hash;
      if ( state.isGist ) {
        hash = `#gist/${ state.repo }${ state.currentFilePath ? '/' + state.currentFilePath : '' }`;
      } else {
        hash = `#${ state.owner }`;
        if ( state.repo ) {
          hash += `/${ state.repo }`;
          if ( state.currentFilePath ) hash += `/${ state.currentFilePath }`;
        }
      }
      if ( location.hash !== hash ) history.pushState( null, '', hash );
    };

    const handleHashChange = async () => {
      const hash = location.hash.replace( /^#\/?/, '' );
      if ( !hash ) { handleFetchRepos(); return; }

      const parts = hash.split( '/' );

      if ( parts[ 0 ] === 'gist' ) {
        const gistId = parts[ 1 ];
        const fp = decodeURIComponent( parts.slice( 2 ).join( '/' ) );
        if ( gistId && state.repo !== gistId ) await handleSelectGist( gistId, !fp );
        if ( fp && state.currentFilePath !== fp ) await handleSelectFile( fp, false );
        return;
      }

      const owner = parts[ 0 ];
      const repo = parts[ 1 ];
      const fp = decodeURIComponent( parts.slice( 2 ).join( '/' ) );

      if ( owner && owner !== state.owner ) {
        ownerInput.value = owner;
        await handleFetchRepos( false );
      }
      if ( repo && state.repo !== repo ) await handleSelectRepo( repo, !fp );
      if ( fp && state.currentFilePath !== fp ) await handleSelectFile( fp, false );
    };

    window.addEventListener( 'popstate', handleHashChange );
    window.addEventListener( 'hashchange', handleHashChange );

    // ── Button state ────────────────────────────────────────────────────────

    const resetMainAction = () => {
      btnMainAction.textContent = 'Get Repos';
      btnMainAction.onclick = handleFetchRepos;
      document.getElementById( 'btnGetOrgs' ).style.display = 'inline-block';
      document.getElementById( 'btnGetGists' ).style.display = 'inline-block';
    };

    // ── Generic paginated list fetcher ──────────────────────────────────────

    const fetchList = async config => {
      const owner = ownerInput.value.trim();
      if ( !owner ) return;

      if ( config.page === 1 ) {
        ownerInput.blur();
        state.owner = owner;
        state.isGist = config.isGist || false;
        if ( config.onReset ) config.onReset();

        mainContent.innerHTML = `<p>Loading ${ config.label.toLowerCase() }...</p>`;
        repoList.innerHTML = '';
        repoListContainer.querySelector( 'h3' ).textContent = config.label;
        document.getElementById( 'filterInput' ).value = '';

        repoListContainer.style.display = 'block';
        navTree.style.display = 'none';
        btnToggleFolders.style.display = 'none';
        resetMainAction();
      }

      try {
        const options = getFetchOptions( config.page === 1 );
        const response = await fetch( config.url, options );
        if ( !response.ok ) throw new Error( `Status: ${ response.status } - ${ response.statusText }` );

        const items = await response.json();

        const oldBtn = document.getElementById( config.btnId );
        if ( oldBtn ) oldBtn.remove();

        const html = items.map( config.itemRenderer ).join( '' );

        if ( config.storeItems ) {
          if ( config.page > 1 ) state.repoItems.push( ...items );
          else state.repoItems = [ ...items ];
          state.repoRenderer = config.itemRenderer;
          document.getElementById( 'sortSelect' ).style.display = 'block';
        } else {
          document.getElementById( 'sortSelect' ).style.display = 'none';
        }

        if ( config.page > 1 ) repoList.insertAdjacentHTML( 'beforeend', html );
        else repoList.innerHTML = html;

        updateRecentUsers( owner );
        const count = repoList.querySelectorAll( '.repo-item' ).length;
        let successHtml = `<p>Loaded ${ count } ${ config.label.toLowerCase() } for ${ owner } (up to page ${ config.page }). Select one to view contents.</p>`;

        if ( config.page === 1 && config.onSuccessFirstPage ) {
          const extra = await config.onSuccessFirstPage();
          if ( extra ) successHtml += extra;
        }

        mainContent.innerHTML = successHtml;

        if ( items.length === 100 ) {
          repoList.insertAdjacentHTML( 'beforeend',
            `<li id="${ config.btnId }" style="text-align: center; margin-top: 1rem;">` +
            `<button type="button" data-action="${ config.onLoadMoreAction }" data-page="${ config.page + 1 }">${ config.loadMoreText }</button></li>` );
        }
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        if ( error.message.includes( '403' ) ) error.message += ' (Rate limit exceeded. Click "⚙️ Token" to increase limit.)';
        mainContent.innerHTML = `<p class="error">Error fetching ${ config.label.toLowerCase() }: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    // ── Fetch repos ─────────────────────────────────────────────────────────

    const handleFetchRepos = async ( doUpdateHash = true, page = 1 ) => {
      await fetchList( {
        page,
        label: 'Repositories',
        isGist: false,
        url: `https://api.github.com/users/${ ownerInput.value.trim() }/repos?per_page=100&sort=updated&page=${ page }`,
        btnId: 'btnLoadMoreRepos',
        loadMoreText: 'Load More Repos',
        onLoadMoreAction: 'load-more-repos',
        storeItems: true,
        onReset: () => {
          state.repo = '';
          state.currentFilePath = '';
          if ( doUpdateHash ) updateHash();
        },
        itemRenderer: repo => {
          const meta = [];
          if ( repo.stargazers_count > 0 ) meta.push( `⭐${ repo.stargazers_count }` );
          if ( repo.language ) {
            const color = languageColors[ repo.language ] || '#586069';
            meta.push( `<span class="repo-lang-dot" style="background:${ color }"></span>${ escapeHTML( repo.language ) }` );
          }
          if ( repo.has_pages ) meta.push( '🌐' );
          if ( repo.pushed_at ) {
            const days = Math.floor( ( Date.now() - new Date( repo.pushed_at ) ) / 86400000 );
            meta.push( days === 0 ? 'today' : days === 1 ? '1d ago' : days < 30 ? `${ days }d ago` : days < 365 ? `${ Math.floor( days / 30 ) }mo ago` : `${ Math.floor( days / 365 ) }y ago` );
          }
          const desc = repo.description ? escapeAttribute( repo.description ) : '';
          return `<li>
            <div class="repo-item" data-action="select-repo" data-repo="${ escapeAttribute( repo.name ) }"${ desc ? ` title="${ desc }"` : '' }>
              ${ escapeHTML( repo.name ) }
              ${ meta.length ? `<div class="repo-meta">${ meta.join( ' ' ) }</div>` : '' }
            </div>
          </li>`;
        },
        onSuccessFirstPage: async () => handleFetchStats( true )
      } );
    };

    // ── Fetch orgs ──────────────────────────────────────────────────────────

    const handleFetchOrgs = async ( page = 1 ) => {
      await fetchList( {
        page,
        label: 'Organizations',
        isGist: false,
        url: `https://api.github.com/users/${ ownerInput.value.trim() }/orgs?per_page=100&page=${ page }`,
        btnId: 'btnLoadMoreOrgs',
        loadMoreText: 'Load More Orgs',
        onLoadMoreAction: 'load-more-orgs',
        itemRenderer: org => `<li>
          <div class="repo-item" data-action="select-owner" data-owner="${ escapeAttribute( org.login ) }">
            ${ escapeHTML( org.login ) }
          </div>
        </li>`
      } );
    };

    // ── Fetch gists ─────────────────────────────────────────────────────────

    const handleFetchGists = async ( page = 1 ) => {
      await fetchList( {
        page,
        label: 'Gists',
        isGist: true,
        url: `https://api.github.com/users/${ ownerInput.value.trim() }/gists?per_page=100&page=${ page }`,
        btnId: 'btnLoadMoreGists',
        loadMoreText: 'Load More Gists',
        onLoadMoreAction: 'load-more-gists',
        itemRenderer: gist => {
          const files = Object.keys( gist.files );
          const title = gist.description || ( files.length ? files[ 0 ] : 'gist' );
          return `<li>
            <div class="repo-item" data-action="select-gist" data-gist-id="${ escapeAttribute( gist.id ) }">
              ${ escapeHTML( title ) }
            </div>
          </li>`;
        }
      } );
    };

    // ── Stats ───────────────────────────────────────────────────────────────

    const handleFetchStats = async ( returnHtml = false ) => {
      const owner = ownerInput.value.trim();
      if ( !owner ) return;
      if ( !returnHtml ) mainContent.innerHTML = '<p>Loading statistics...</p>';

      try {
        const options = { headers, signal: mainAbortController?.signal };
        const isRepoLevel = state.repo && navTree.style.display !== 'none' && !state.isGist;
        const url = isRepoLevel
          ? `https://api.github.com/repos/${ owner }/${ state.repo }`
          : `https://api.github.com/users/${ owner }`;

        const response = await fetch( url, options );
        if ( !response.ok ) throw new Error( `Status: ${ response.status } - ${ response.statusText }` );
        const data = await response.json();

        let languagesHtml = '';
        if ( isRepoLevel ) {
          const langResponse = await fetch( `https://api.github.com/repos/${ owner }/${ state.repo }/languages`, options );
          if ( langResponse.ok ) {
            const languages = await langResponse.json();
            const entries = Object.entries( languages );
            const total = entries.reduce( ( sum, [ , b ] ) => sum + b, 0 );
            if ( entries.length && total > 0 ) {
              languagesHtml = `<div style="margin-top: 1.5rem;">
                <h3 style="margin: 0 0 0.75rem 0; font-size: 1rem;">Language Breakdown</h3>
                <div style="display: grid; gap: 0.5rem;">
                  ${ entries.sort( ( a, b ) => b[ 1 ] - a[ 1 ] ).map( ( [ lang, bytes ] ) => {
                const pct = ( bytes / total * 100 );
                return `<div style="display: grid; gap: 0.25rem;">
                      <div style="display: flex; justify-content: space-between; gap: 1rem; font-size: 0.95rem;">
                        <span><strong>${ escapeHTML( lang ) }</strong></span>
                        <span>${ pct.toFixed( 1 ) }% · ${ bytes.toLocaleString() } bytes</span>
                      </div>
                      <div style="height: 0.55rem; background: var(--primary-bg); border-radius: 999px; overflow: hidden; border: 1px solid var(--border-color);">
                        <div style="height: 100%; width: ${ pct.toFixed( 2 ) }%; background: var(--highlight-color);"></div>
                      </div>
                    </div>`;
              } ).join( '' ) }
                </div>
              </div>`;
            }
          }
        }

        let html = `<div style="padding: 1.5rem; background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: 6px;">`;
        if ( isRepoLevel ) {
          html += `
            <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
              <img src="${ escapeAttribute( data.owner.avatar_url ) }" style="width: 48px; height: 48px; border-radius: 50%;">
              <h2 style="margin: 0;">Repository: <a href="${ escapeAttribute( data.html_url ) }" target="_blank" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.full_name ) }</a></h2>
            </div>
            ${ data.description ? `<p style="font-size: 1.1rem; color: #57606a; margin-bottom: 1.5rem;">${ escapeHTML( data.description ) }</p>` : '' }
            <ul style="list-style: none; padding: 0; line-height: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem;">
              <li>⭐ <strong>Stars:</strong> ${ data.stargazers_count }</li>
              <li>👁️ <strong>Watchers:</strong> ${ data.watchers_count }</li>
              <li>🔀 <strong>Forks:</strong> ${ data.forks_count }</li>
              <li>🐛 <strong>Open Issues:</strong> ${ data.open_issues_count }</li>
              <li>💻 <strong>Language:</strong> ${ escapeHTML( data.language || 'N/A' ) }</li>
              <li>⚖️ <strong>License:</strong> ${ data.license ? escapeHTML( data.license.name ) : 'None' }</li>
              <li>🕒 <strong>Created:</strong> ${ new Date( data.created_at ).toLocaleDateString() }</li>
              <li>🔄 <strong>Updated:</strong> ${ new Date( data.updated_at ).toLocaleDateString() }</li>
              <li>📦 <strong>Size:</strong> ${ ( data.size / 1024 ).toFixed( 2 ) } MB</li>
              ${ data.homepage ? `<li>🌐 <strong>Website:</strong> <a href="${ data.homepage.startsWith( 'http' ) ? escapeAttribute( data.homepage ) : 'http://' + escapeAttribute( data.homepage ) }" target="_blank" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.homepage ) }</a></li>` : '' }
              <li>📄 <strong>Pages:</strong> ${ data.has_pages ? 'Enabled' : 'Disabled' }</li>
            </ul>`;

          // ── Repository Stats from tree data ──
          if ( state.tree.length ) {
            const blobs = state.tree.filter( i => i.type === 'blob' );
            const folders = state.tree.filter( i => i.type === 'tree' );
            const totalSize = blobs.reduce( ( s, f ) => s + ( f.size || 0 ), 0 );

            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Repository Stats</h3>
              <ul style="list-style: none; padding: 0; line-height: 2;">
                <li>📄 <strong>Files:</strong> ${ blobs.length.toLocaleString() }</li>
                <li>📁 <strong>Folders:</strong> ${ folders.length.toLocaleString() }</li>
                <li>📦 <strong>Total Size:</strong> ${ formatFileSize( totalSize ) }</li>
              </ul>`;

            // Files by type
            const extMap = {};
            blobs.forEach( f => {
              const parts = f.path.split( '.' );
              const ext = parts.length > 1 ? '.' + parts.pop().toLowerCase() : '(no ext)';
              if ( !extMap[ ext ] ) extMap[ ext ] = { count: 0, size: 0 };
              extMap[ ext ].count++;
              extMap[ ext ].size += f.size || 0;
            } );
            const extEntries = Object.entries( extMap ).sort( ( a, b ) => b[ 1 ].count - a[ 1 ].count );

            if ( extEntries.length ) {
              html += `
                <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Files by Type</h3>
                <table style="border-collapse: collapse; width: 100%; max-width: 500px; font-size: 0.95rem;">
                  <thead><tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                    <th style="padding: 0.3rem 0.5rem;">Extension</th>
                    <th style="padding: 0.3rem 0.5rem; text-align: right;">Count</th>
                    <th style="padding: 0.3rem 0.5rem; text-align: right;">Size</th>
                  </tr></thead>
                  <tbody>
                    ${ extEntries.map( ( [ ext, info ] ) =>
                `<tr style="border-bottom: 1px solid var(--border-color);">
                        <td style="padding: 0.3rem 0.5rem; font-family: monospace;">${ escapeHTML( ext ) }</td>
                        <td style="padding: 0.3rem 0.5rem; text-align: right;">${ info.count }</td>
                        <td style="padding: 0.3rem 0.5rem; text-align: right;">${ formatFileSize( info.size ) }</td>
                      </tr>` ).join( '' ) }
                  </tbody>
                </table>`;
            }

            // Largest files (top 10)
            const largest = [ ...blobs ].filter( f => f.size > 0 ).sort( ( a, b ) => b.size - a.size ).slice( 0, 10 );
            if ( largest.length ) {
              html += `
                <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Largest Files</h3>
                <table style="border-collapse: collapse; width: 100%; max-width: 600px; font-size: 0.95rem;">
                  <thead><tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                    <th style="padding: 0.3rem 0.5rem;">File</th>
                    <th style="padding: 0.3rem 0.5rem; text-align: right;">Size</th>
                  </tr></thead>
                  <tbody>
                    ${ largest.map( f => {
                const name = f.path.split( '/' ).pop();
                return `<tr style="border-bottom: 1px solid var(--border-color);">
                        <td style="padding: 0.3rem 0.5rem;">
                          <span style="color: var(--highlight-color); cursor: pointer;" onclick="handleSelectFile('${ escapeAttribute( f.path ) }')">${ escapeHTML( name ) }</span>
                          <span style="font-size: 0.8rem; color: #57606a; margin-left: 0.5rem;">${ escapeHTML( f.path.includes( '/' ) ? f.path.substring( 0, f.path.lastIndexOf( '/' ) ) : '' ) }</span>
                        </td>
                        <td style="padding: 0.3rem 0.5rem; text-align: right; white-space: nowrap;">${ formatFileSize( f.size ) }</td>
                      </tr>`;
              } ).join( '' ) }
                  </tbody>
                </table>`;
            }
          }

          html += languagesHtml;
        } else {
          // Fetch additional data in parallel: orgs + repos + contributions (GraphQL, token-only)
          const contributionsQuery = ghToken ? fetch( 'https://api.github.com/graphql', {
            method: 'POST',
            headers: { Authorization: `bearer ${ ghToken }`, 'Content-Type': 'application/json' },
            signal: options.signal,
            body: JSON.stringify( {
              query: `{
              user(login: "${ owner.replace( /"/g, '\\"' ) }") {
                contributionsCollection {
                  totalCommitContributions
                  totalPullRequestContributions
                  totalIssueContributions
                  totalPullRequestReviewContributions
                  totalRepositoryContributions
                  contributionCalendar {
                    totalContributions
                    weeks { contributionDays { contributionCount date color } }
                  }
                }
              }
            }` } )
          } ).then( r => r.ok ? r.json() : null ).catch( () => null ) : Promise.resolve( null );

          const [ orgsResp, reposResp, gqlData ] = await Promise.all( [
            fetch( `https://api.github.com/users/${ owner }/orgs?per_page=100`, options ),
            fetch( `https://api.github.com/users/${ owner }/repos?per_page=100&sort=updated`, options ),
            contributionsQuery
          ] );

          const orgs = orgsResp.ok ? await orgsResp.json() : [];
          const repos = reposResp.ok ? await reposResp.json() : [];

          // Compute aggregate stats from repos
          const totalStars = repos.reduce( ( s, r ) => s + ( r.stargazers_count || 0 ), 0 );
          const totalForks = repos.reduce( ( s, r ) => s + ( r.forks_count || 0 ), 0 );
          const thirtyDaysAgo = Date.now() - 30 * 86400000;
          const activeRepos = repos.filter( r => new Date( r.pushed_at ) > thirtyDaysAgo ).length;

          // Top languages by repo count
          const langCounts = {};
          repos.forEach( r => { if ( r.language ) langCounts[ r.language ] = ( langCounts[ r.language ] || 0 ) + 1; } );
          const topLangs = Object.entries( langCounts ).sort( ( a, b ) => b[ 1 ] - a[ 1 ] );

          // Recently updated repos (top 8)
          const recentRepos = repos.slice( 0, 8 );

          const relTime = dateStr => {
            const days = Math.floor( ( Date.now() - new Date( dateStr ) ) / 86400000 );
            if ( days === 0 ) return 'today';
            if ( days === 1 ) return '1 day ago';
            if ( days < 30 ) return `${ days } days ago`;
            if ( days < 365 ) return `${ Math.floor( days / 30 ) }mo ago`;
            return `${ Math.floor( days / 365 ) }y ago`;
          };

          // ── Profile header ──
          html += `
            <div style="display: flex; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem;">
              <img src="${ escapeAttribute( data.avatar_url ) }" style="width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-color);">
              <div>
                <h2 style="margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                  <a href="${ escapeAttribute( data.html_url ) }" target="_blank" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.name || data.login ) }</a>
                  <small style="color: #57606a; font-weight: normal;">(@${ escapeHTML( data.login ) })</small>
                </h2>
                ${ data.type === 'Organization' ? '<span style="background: #eef2f5; border: 1px solid #d0d7de; font-size: 0.8rem; padding: 0.1rem 0.4rem; border-radius: 12px; margin-top: 0.25rem; display: inline-block;">Organization</span>' : '' }
              </div>
            </div>
            ${ data.bio ? `<p style="font-size: 1.1rem; color: #57606a; margin-bottom: 1.5rem;">${ escapeHTML( data.bio ) }</p>` : '' }`;

          // ── Contributions (GraphQL, requires token) ──
          const contrib = gqlData?.data?.user?.contributionsCollection;
          if ( contrib ) {
            const cal = contrib.contributionCalendar;

            // Render contribution calendar grid (52 weeks × 7 days)
            const weeksHtml = cal.weeks.map( week =>
              `<g>${ week.contributionDays.map( ( day, di ) =>
                `<rect width="10" height="10" x="0" y="${ di * 13 }" rx="2" ry="2" fill="${ escapeAttribute( day.color ) }" data-date="${ escapeAttribute( day.date ) }" data-count="${ day.contributionCount }"><title>${ escapeHTML( day.date ) }: ${ day.contributionCount } contributions</title></rect>`
              ).join( '' ) }</g>`
            ).map( ( g, wi ) => g.replace( '<g>', `<g transform="translate(${ wi * 14 }, 0)">` ) ).join( '' );

            const svgWidth = cal.weeks.length * 14;

            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Contributions</h3>
              <div style="overflow-x: auto; padding: 0.5rem 0;">
                <svg width="${ svgWidth }" height="104" style="display: block;">
                  ${ weeksHtml }
                </svg>
              </div>
              <p style="font-size: 0.95rem; color: #57606a; margin: 0.25rem 0 0 0;">${ cal.totalContributions.toLocaleString() } contributions in the last year</p>`;

            // ── Achievements ──
            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Achievements</h3>
              <ul style="list-style: none; padding: 0; line-height: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.25rem;">
                <li>🔨 <strong>Total Commits:</strong> ${ contrib.totalCommitContributions.toLocaleString() }</li>
                <li>🔀 <strong>Pull Requests:</strong> ${ contrib.totalPullRequestContributions }</li>
                <li>🐛 <strong>Issues Opened:</strong> ${ contrib.totalIssueContributions }</li>
                <li>👀 <strong>Code Reviews:</strong> ${ contrib.totalPullRequestReviewContributions }</li>
                <li>📁 <strong>Repos Created:</strong> ${ contrib.totalRepositoryContributions }</li>
              </ul>`;
          } else if ( !ghToken ) {
            html += `<p style="font-size: 0.85rem; color: #57606a; margin-top: 1rem; font-style: italic;">💡 Add a token via "⚙️ Token" to see contributions, achievements, and the contribution calendar.</p>`;
          }

          // ── Overview ──
          html += `
            <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Overview</h3>
            <ul style="list-style: none; padding: 0; line-height: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.25rem;">
              ${ data.location ? `<li>📍 <strong>Location:</strong> ${ escapeHTML( data.location ) }</li>` : '' }
              <li>👥 <strong>Followers:</strong> ${ data.followers }</li>
              <li>👤 <strong>Following:</strong> ${ data.following }</li>
              <li>📁 <strong>Public Repos:</strong> ${ data.public_repos }</li>
              <li>📝 <strong>Public Gists:</strong> ${ data.public_gists }</li>
              <li>⭐ <strong>Total Stars Earned:</strong> ${ totalStars }</li>
              <li>🍴 <strong>Total Forks:</strong> ${ totalForks }</li>
              <li>🔥 <strong>Active Last 30 Days:</strong> ${ activeRepos } repos</li>
              <li>🕒 <strong>Joined:</strong> ${ new Date( data.created_at ).toLocaleDateString() }</li>
              ${ data.blog ? `<li>🌐 <strong>Website:</strong> <a href="${ data.blog.startsWith( 'http' ) ? escapeAttribute( data.blog ) : 'https://' + escapeAttribute( data.blog ) }" target="_blank" rel="noopener" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.blog ) }</a></li>` : '' }
              <li>🐙 <strong>GitHub:</strong> <a href="${ escapeAttribute( data.html_url ) }" target="_blank" rel="noopener" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.html_url ) }</a></li>
              ${ data.twitter_username ? `<li>🐦 <strong>Twitter:</strong> <a href="https://twitter.com/${ escapeAttribute( data.twitter_username ) }" target="_blank" rel="noopener" style="color: var(--highlight-color); text-decoration: none;">@${ escapeHTML( data.twitter_username ) }</a></li>` : '' }
              ${ data.company ? `<li>🏢 <strong>Company:</strong> ${ escapeHTML( data.company ) }</li>` : '' }
              ${ data.email ? `<li>📧 <strong>Email:</strong> <a href="mailto:${ escapeAttribute( data.email ) }" style="color: var(--highlight-color); text-decoration: none;">${ escapeHTML( data.email ) }</a></li>` : '' }
            </ul>`;

          // ── Organizations ──
          if ( orgs.length ) {
            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Organizations</h3>
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                ${ orgs.map( o => `<button onclick="ownerInput.value='${ escapeAttribute( o.login ) }'; handleFetchRepos()"
                  style="background: var(--hover-bg); color: var(--highlight-color); border: 1px solid var(--border-color); padding: 0.3rem 0.75rem; font-size: 0.9rem;">
                  ${ escapeHTML( o.login ) }</button>` ).join( '' ) }
              </div>`;
          }

          // ── Top Languages ──
          if ( topLangs.length ) {
            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Top Languages</h3>
              <table style="border-collapse: collapse; width: 100%; max-width: 400px; font-size: 0.95rem;">
                <thead><tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                  <th style="padding: 0.3rem 0.5rem;">Language</th><th style="padding: 0.3rem 0.5rem; text-align: right;">Repos</th>
                </tr></thead>
                <tbody>
                  ${ topLangs.map( ( [ lang, count ] ) => {
              const color = languageColors[ lang ] || '#586069';
              return `<tr style="border-bottom: 1px solid var(--border-color);">
                      <td style="padding: 0.3rem 0.5rem;"><span class="repo-lang-dot" style="background:${ color }; margin-right: 0.4rem;"></span>${ escapeHTML( lang ) }</td>
                      <td style="padding: 0.3rem 0.5rem; text-align: right;">${ count }</td>
                    </tr>`;
            } ).join( '' ) }
                </tbody>
              </table>`;
          }

          // ── Recently Updated ──
          if ( recentRepos.length ) {
            html += `
              <h3 style="margin: 1.5rem 0 0.5rem 0; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Recently Updated</h3>
              <table style="border-collapse: collapse; width: 100%; max-width: 500px; font-size: 0.95rem;">
                <thead><tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                  <th style="padding: 0.3rem 0.5rem;">Repository</th><th style="padding: 0.3rem 0.5rem; text-align: right;">Updated</th>
                </tr></thead>
                <tbody>
                  ${ recentRepos.map( r => `<tr style="border-bottom: 1px solid var(--border-color);">
                    <td style="padding: 0.3rem 0.5rem;">
                      <span style="color: var(--highlight-color); cursor: pointer;" onclick="ownerInput.value='${ escapeAttribute( owner ) }'; handleSelectRepo('${ escapeAttribute( r.name ) }')">${ escapeHTML( r.name ) }</span>
                      ${ r.stargazers_count ? ` <span style="font-size: 0.8rem; color: #57606a;">⭐${ r.stargazers_count }</span>` : '' }
                    </td>
                    <td style="padding: 0.3rem 0.5rem; text-align: right; color: #57606a;">${ relTime( r.pushed_at ) }</td>
                  </tr>` ).join( '' ) }
                </tbody>
              </table>`;
          }
        }

        html += `</div>`;
        if ( returnHtml ) return html;
        mainContent.innerHTML = html;
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return returnHtml ? '' : undefined;
        if ( error.message.includes( '403' ) ) error.message += ' (Rate limit exceeded. Click "⚙️ Token" to increase limit.)';
        const msg = `<p class="error">Error fetching stats: ${ escapeHTML( error.message ) }</p>`;
        if ( returnHtml ) return msg;
        mainContent.innerHTML = msg;
      }
    };

    // ── Select repo ─────────────────────────────────────────────────────────

    const handleSelectRepo = async ( repoName, autoOpenReadme = true, branch = null ) => {
      state.repo = repoName;
      state.branch = branch || 'main';
      state.currentFilePath = '';
      if ( autoOpenReadme ) updateHash();
      mainContent.innerHTML = `<p>Loading ${ escapeHTML( repoName ) }...</p>`;

      try {
        const options = getFetchOptions( true );

        if ( !branch ) {
          const repoResp = await fetch( `https://api.github.com/repos/${ state.owner }/${ state.repo }`, options );
          if ( !repoResp.ok ) throw new Error( `Status: ${ repoResp.status } - ${ repoResp.statusText }` );
          const repoData = await repoResp.json();
          state.branch = repoData.default_branch;
        }

        const branchesResp = await fetch( `https://api.github.com/repos/${ state.owner }/${ state.repo }/branches?per_page=100`, options );
        let branchesHtml = '';
        if ( branchesResp.ok ) {
          const branches = await branchesResp.json();
          branchesHtml = `<select data-repo="${ escapeAttribute( state.repo ) }"
            onchange="handleSelectRepo(this.dataset.repo, true, this.value)"
            style="margin-left: 0.5rem; padding: 0.2rem; border-radius: 4px; max-width: 120px;">
            ${ branches.map( b =>
            `<option value="${ escapeAttribute( b.name ) }"${ b.name === state.branch ? ' selected' : '' }>${ escapeHTML( b.name ) }</option>`
          ).join( '' ) }
          </select>`;
        }

        const treeResp = await fetch( `https://api.github.com/repos/${ state.owner }/${ state.repo }/git/trees/${ state.branch }?recursive=1`, options );
        if ( !treeResp.ok ) throw new Error( `Status: ${ treeResp.status } - ${ treeResp.statusText }` );
        const treeData = await treeResp.json();

        const warningEl = document.getElementById( 'treeTruncatedWarning' );
        warningEl.style.display = treeData.truncated ? 'block' : 'none';
        if ( treeData.truncated ) console.warn( 'Tree response is truncated.' );

        state.tree = treeData.tree || [];

        repoListContainer.style.display = 'none';
        navTree.style.display = 'block';
        navTree.querySelector( 'h3' ).innerHTML = `Files ${ branchesHtml }`;

        btnMainAction.textContent = '← Back to Repos';
        btnMainAction.onclick = handleBackToRepos;
        document.getElementById( 'btnGetOrgs' ).style.display = 'none';
        document.getElementById( 'btnGetGists' ).style.display = 'none';

        btnToggleFolders.style.display = 'inline-block';
        btnToggleFolders.textContent = 'Expand All';
        btnToggleFolders.dataset.expanded = 'false';

        renderTree( state.tree );

        // Auto-open README — spec: hash is NOT updated for this auto-display
        const readmeFile = state.tree.find( item =>
          item.type === 'blob' && /^readme(\.md|\.txt)?$/i.test( item.path.split( '/' ).pop() )
        );

        if ( autoOpenReadme && readmeFile ) {
          handleSelectFile( readmeFile.path, false );
        } else if ( autoOpenReadme ) {
          mainContent.innerHTML = `<p>Viewing repository: <strong>${ escapeHTML( repoName ) }</strong> (Branch: ${ escapeHTML( state.branch ) })</p>`;
        }
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        if ( error.message.includes( '403' ) ) error.message += ' (Rate limit exceeded. Click "⚙️ Token" to increase limit.)';
        mainContent.innerHTML = `<p class="error">Error loading repo tree: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    // ── Select gist ─────────────────────────────────────────────────────────

    const handleSelectGist = async ( gistId, autoOpenFile = true ) => {
      state.repo = gistId;
      state.branch = '';
      state.isGist = true;
      state.currentFilePath = '';
      if ( autoOpenFile ) updateHash();
      mainContent.innerHTML = '<p>Loading gist...</p>';

      try {
        const options = getFetchOptions( true );
        const response = await fetch( `https://api.github.com/gists/${ gistId }`, options );
        if ( !response.ok ) throw new Error( `Status: ${ response.status } - ${ response.statusText }` );

        const gist = await response.json();
        state.tree = Object.keys( gist.files ).map( filename => ( {
          path: filename,
          type: 'blob',
          url: gist.files[ filename ].raw_url,
          fileNode: gist.files[ filename ]
        } ) );

        repoListContainer.style.display = 'none';
        navTree.style.display = 'block';

        btnMainAction.textContent = '← Back to Gists';
        btnMainAction.onclick = handleBackToRepos;
        document.getElementById( 'btnGetOrgs' ).style.display = 'none';
        document.getElementById( 'btnGetGists' ).style.display = 'none';

        treeList.innerHTML = '';
        renderTree( state.tree );

        const firstFile = state.tree[ 0 ];
        if ( autoOpenFile && firstFile ) handleSelectFile( firstFile.path, true );
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        if ( error.message.includes( '403' ) ) error.message += ' (Rate limit exceeded. Click "⚙️ Token" to increase limit.)';
        mainContent.innerHTML = `<p class="error">Error loading gist: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    // ── File content loading ─────────────────────────────────────────────────

    const loadFileContent = async ( ext, url, path, signal ) => {
      let renderedHtml = '';
      let rawHtml = '';
      let showToggles = false;
      const fetchOpts = signal ? { signal } : {};

      if ( [ 'png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico' ].includes( ext ) ) {
        renderedHtml = `<img src="${ escapeAttribute( url ) }" class="media-content" alt="${ escapeAttribute( path ) }">`;
        if ( ext === 'svg' ) {
          const resp = await fetch( url, fetchOpts );
          rawHtml = `<pre><code>${ escapeHTML( await resp.text() ) }</code></pre>`;
          showToggles = true;
        }
      } else if ( [ 'mp3', 'wav', 'ogg' ].includes( ext ) ) {
        renderedHtml = `<audio controls src="${ escapeAttribute( url ) }" style="width: 100%; margin-top: 1rem;"></audio>`;
      } else if ( [ 'mp4', 'webm' ].includes( ext ) ) {
        renderedHtml = `<video controls src="${ escapeAttribute( url ) }" class="media-content"></video>`;
      } else if ( ext === 'pdf' ) {
        const docUrl = `https://docs.google.com/viewer?url=${ encodeURIComponent( url ) }&embedded=true`;
        renderedHtml = `<iframe src="${ escapeAttribute( docUrl ) }" class="iframe-content"></iframe>`;
      } else {
        const resp = await fetch( url, fetchOpts );
        if ( !resp.ok ) throw new Error( 'Failed to load file content.' );
        const text = await resp.text();
        rawHtml = `<pre><code class="language-${ escapeAttribute( ext ) }">${ escapeHTML( text ) }</code></pre>`;

        if ( ext === 'md' ) {
          try {
            renderedHtml = `<div class="markdown-body">${ DOMPurify.sanitize( marked.parse( text ) ) }</div>`;
            showToggles = true;
          } catch ( err ) {
            console.error( 'Markdown render failed:', err );
            renderedHtml = `<div class="md-error">⚠️ Failed to render Markdown. Showing raw text.</div>` + rawHtml;
          }
        } else if ( [ 'html', 'htm' ].includes( ext ) ) {
          const blobUrl = URL.createObjectURL( new Blob( [ text ], { type: 'text/html' } ) );
          renderedHtml = `<iframe src="${ blobUrl }" sandbox="allow-scripts" class="iframe-content"></iframe>`;
          showToggles = true;
        } else {
          renderedHtml = rawHtml;
        }
      }

      return { renderedHtml, rawHtml, showToggles };
    };

    // ── Rendered/Raw toggle ──────────────────────────────────────────────────

    const toggleFileView = view => {
      const viewRendered = document.getElementById( 'viewRendered' );
      const viewRaw = document.getElementById( 'viewRaw' );
      const btnRendered = document.getElementById( 'btnRendered' );
      const btnRaw = document.getElementById( 'btnRaw' );

      const isRaw = view === 'raw';
      if ( viewRendered ) viewRendered.style.display = isRaw ? 'none' : 'block';
      if ( viewRaw ) viewRaw.style.display = isRaw ? 'block' : 'none';
      if ( btnRendered ) btnRendered.style.opacity = isRaw ? '0.5' : '1';
      if ( btnRaw ) btnRaw.style.opacity = isRaw ? '1' : '0.5';
    };

    // ── Select file ──────────────────────────────────────────────────────────

    const handleSelectFile = async ( path, doUpdateHash = true ) => {
      try {
        const fileNode = state.tree.find( item => item.path === path );
        const knownSize = getKnownFileSize( fileNode );

        if ( !confirmLargeFileLoad( path, knownSize ) ) {
          mainContent.innerHTML = `<p>Skipped loading ${ escapeHTML( path ) }${ knownSize != null ? ` (${ formatFileSize( knownSize ) })` : '' }.</p>`;
          return;
        }

        state.currentFilePath = path;
        if ( doUpdateHash ) updateHash();
        mainContent.innerHTML = `<p>Loading file: ${ escapeHTML( path ) }...</p>`;

        const options = getFetchOptions( true );
        const url = ( state.isGist && fileNode?.url )
          ? fileNode.url
          : `https://raw.githubusercontent.com/${ state.owner }/${ state.repo }/${ state.branch }/${ path }`;
        const ext = path.split( '.' ).pop().toLowerCase();

        const githubLink = state.isGist
          ? `https://gist.github.com/${ state.owner }/${ state.repo }#file-${ path.replace( /\./g, '-' ) }`
          : `https://github.com/${ state.owner }/${ state.repo }/blob/${ state.branch }/${ path }`;

        const newTabUrl = state.isGist
          ? url
          : `https://${ state.owner }.github.io/${ state.repo }/${ path }`;

        const pathParts = path.split( '/' );
        const fileName = pathParts.pop();
        const repoLink = state.isGist
          ? escapeHTML( state.repo )
          : `<a href="#${ escapeAttribute( state.owner ) }/${ escapeAttribute( state.repo ) }"
               style="color: var(--highlight-color); text-decoration: none; font-weight: normal; cursor: pointer;"
               data-owner="${ escapeAttribute( state.owner ) }"
               data-repo="${ escapeAttribute( state.repo ) }"
               data-branch="${ escapeAttribute( state.branch ) }"
               onclick="event.preventDefault(); history.pushState(null, '', '#' + this.dataset.owner + '/' + this.dataset.repo); handleSelectRepo(this.dataset.repo, false, this.dataset.branch)">${ escapeHTML( state.repo ) }</a>`;
        const pathPrefix = pathParts.length ? pathParts.join( ' / ' ) + ' / ' : '';

        const headerHtml = `
          <div class="file-header">
            <h3 class="file-title">
              <span class="file-title-path">${ repoLink } / ${ pathPrefix }</span>${ escapeHTML( fileName ) }
              <a href="${ escapeAttribute( githubLink ) }" target="_blank" rel="noopener" title="View on GitHub" class="file-source-link">
                <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                </svg>
              </a>
            </h3>
            <div class="file-actions">
              <button onclick="window.open('${ escapeAttribute( newTabUrl ) }', '_blank', 'noopener')" class="file-btn" title="Open in new tab">New Tab</button>
              <div id="fileViewToggles" class="file-actions" style="display: none;">
                <button id="btnRendered" onclick="toggleFileView('rendered')" class="file-btn">Rendered</button>
                <button id="btnRaw" onclick="toggleFileView('raw')" class="file-btn" style="opacity: 0.5;">Raw</button>
              </div>
            </div>
          </div>`;

        const { renderedHtml, rawHtml, showToggles } = await loadFileContent( ext, url, path, options.signal );

        mainContent.innerHTML = `
          ${ headerHtml }
          <div id="viewRendered" style="display: block;">${ renderedHtml }</div>
          ${ rawHtml ? `<div id="viewRaw" style="display: none;">${ rawHtml }</div>` : '' }`;

        if ( showToggles ) document.getElementById( 'fileViewToggles' ).style.display = 'flex';

        try {
          if ( window.hljs ) hljs.highlightAll();
        } catch ( e ) {
          console.error( 'Syntax highlighting failed', e );
        }

        // Rewrite internal links in markdown
        if ( ext === 'md' && !state.isGist ) {
          const renderedView = document.getElementById( 'viewRendered' );
          renderedView.querySelectorAll( 'a' ).forEach( a => {
            const href = a.getAttribute( 'href' );
            if ( !href ) return;

            const prefix = `https://github.com/${ state.owner }/${ state.repo }/blob/`;
            if ( href.startsWith( prefix ) ) {
              a.onclick = e => {
                e.preventDefault();
                let p = href.substring( prefix.length );
                if ( p.startsWith( state.branch + '/' ) ) p = p.substring( state.branch.length + 1 );
                else { const s = p.indexOf( '/' ); if ( s !== -1 ) p = p.substring( s + 1 ); }
                handleSelectFile( decodeURIComponent( p ) );
              };
            } else if ( !href.startsWith( 'http://' ) && !href.startsWith( 'https://' ) && !href.startsWith( 'mailto:' ) && !href.startsWith( '#' ) ) {
              a.onclick = e => {
                e.preventDefault();
                const [ relativePath ] = href.split( '#' );
                const currentDir = path.includes( '/' ) ? path.split( '/' ).slice( 0, -1 ) : [];
                const resolved = [ ...currentDir ];
                relativePath.split( '/' ).forEach( seg => {
                  if ( !seg || seg === '.' ) return;
                  if ( seg === '..' ) { resolved.pop(); return; }
                  resolved.push( seg );
                } );
                if ( resolved.length ) handleSelectFile( decodeURIComponent( resolved.join( '/' ) ) );
              };
            } else if ( !href.startsWith( '#' ) ) {
              a.target = '_blank';
              a.rel = 'noopener';
            }
          } );
        }
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        mainContent.innerHTML = `<p class="error">Error: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    // ── Back to repos ────────────────────────────────────────────────────────

    const handleBackToRepos = () => {
      state.repo = '';
      state.currentFilePath = '';
      updateHash();
      repoListContainer.style.display = 'block';
      navTree.style.display = 'none';
      resetMainAction();
      btnToggleFolders.style.display = 'none';
      mainContent.innerHTML = '<p>Select a repository.</p>';
    };

    // ── Tree rendering ────────────────────────────────────────────────────────
    // Spec: folders sorted before files, then alphabetically within each group

    const renderTree = tree => {
      const root = {};
      tree.forEach( item => {
        const parts = item.path.split( '/' );
        let node = root;
        parts.forEach( ( part, i ) => {
          if ( !node[ part ] ) {
            node[ part ] = {
              _item: i === parts.length - 1 ? item : { type: 'tree', path: parts.slice( 0, i + 1 ).join( '/' ) },
              _children: {}
            };
          }
          node = node[ part ]._children;
        } );
      } );

      const buildHtml = node => {
        const keys = Object.keys( node );
        // Sort: folders before files, then alphabetically within each group
        keys.sort( ( a, b ) => {
          const aIsFolder = node[ a ]._item.type === 'tree';
          const bIsFolder = node[ b ]._item.type === 'tree';
          if ( aIsFolder !== bIsFolder ) return aIsFolder ? -1 : 1;
          return a.localeCompare( b );
        } );

        return keys.map( key => {
          const child = node[ key ];
          const item = child._item;

          if ( item.type === 'tree' ) {
            return `<details>
              <summary class="tree-folder" tabindex="0">📁 ${ escapeHTML( key ) }</summary>
              <div class="tree-children">${ buildHtml( child._children ) }</div>
            </details>`;
          }

          const sizeLabel = item.size != null
            ? `<span class="tree-item-size">${ formatFileSize( item.size ) }</span>`
            : '';
          return `<div class="tree-item" tabindex="0" data-action="select-file" data-path="${ escapeAttribute( item.path ) }">
            <span class="tree-item-label">📄 ${ escapeHTML( key ) }</span>
            ${ sizeLabel }
          </div>`;
        } ).join( '' );
      };

      treeList.innerHTML = buildHtml( root );
    };

    // ── Expand/Collapse all ───────────────────────────────────────────────────

    const toggleAllFolders = () => {
      const expand = btnToggleFolders.dataset.expanded !== 'true';
      btnToggleFolders.dataset.expanded = expand.toString();
      btnToggleFolders.textContent = expand ? 'Collapse All' : 'Expand All';
      document.querySelectorAll( '#treeList details' ).forEach( d => {
        if ( expand ) d.setAttribute( 'open', '' );
        else d.removeAttribute( 'open' );
      } );
    };

    // ── Filter & sort repo list ────────────────────────────────────────────────

    let filterTimeout;
    const filterList = () => {
      clearTimeout( filterTimeout );
      filterTimeout = setTimeout( () => {
        const filter = document.getElementById( 'filterInput' ).value.toLowerCase();
        document.querySelectorAll( '#repoList li' ).forEach( li => {
          li.style.display = li.textContent.toLowerCase().includes( filter ) ? '' : 'none';
        } );
      }, 250 );
    };

    const sortRepoList = () => {
      if ( !state.repoItems.length || !state.repoRenderer ) return;
      const sortBy = document.getElementById( 'sortSelect' ).value;
      const sorted = [ ...state.repoItems ];
      const comparators = {
        updated: ( a, b ) => new Date( b.updated_at ) - new Date( a.updated_at ),
        stars: ( a, b ) => ( b.stargazers_count || 0 ) - ( a.stargazers_count || 0 ),
        name: ( a, b ) => a.name.localeCompare( b.name ),
        pushed: ( a, b ) => new Date( b.pushed_at || 0 ) - new Date( a.pushed_at || 0 ),
        size: ( a, b ) => ( b.size || 0 ) - ( a.size || 0 )
      };
      sorted.sort( comparators[ sortBy ] || comparators.updated );
      repoList.innerHTML = sorted.map( state.repoRenderer ).join( '' );
      filterList();
    };

    // ── Discover ──────────────────────────────────────────────────────────────

    const handleDiscover = () => {
      repoListContainer.style.display = 'none';
      navTree.style.display = 'none';
      btnToggleFolders.style.display = 'none';
      document.getElementById( 'btnGetOrgs' ).style.display = 'none';
      document.getElementById( 'btnGetGists' ).style.display = 'none';

      btnMainAction.textContent = '← Back to Search';
      btnMainAction.onclick = () => {
        resetMainAction();
        if ( ownerInput.value.trim() ) handleFetchRepos();
        else { repoListContainer.style.display = 'block'; mainContent.innerHTML = ''; }
      };

      const curated = {
        'Creative Coding & 3D': [ 'mrdoob', 'pmndrs', 'greggman', 'd3', 'playcanvas' ],
        'Massive Orgs': [ 'microsoft', 'google', 'nasa', 'vercel', 'freeCodeCamp' ],
        'Prolific Devs': [ 'sindresorhus', 'tj', 'torvalds', 'ruanyf', 'gaearon' ]
      };

      const listsHtml = Object.entries( curated ).map( ( [ category, users ] ) => `
        <div style="margin-bottom: 1.5rem;">
          <h4 style="margin: 0 0 0.5rem 0; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">${ escapeHTML( category ) }</h4>
          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            ${ users.map( u => `<button onclick="ownerInput.value='${ escapeAttribute( u ) }'; handleFetchRepos()"
              style="background: var(--hover-bg); color: var(--highlight-color); border: 1px solid var(--border-color);">${ escapeHTML( u ) }</button>` ).join( '' ) }
          </div>
        </div>` ).join( '' );

      mainContent.innerHTML = `
        <div style="padding: 1.5rem; background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: 6px; max-width: 800px; margin: 0 auto; line-height: 1.6;">
          <h2 style="margin-top: 0;">🌍 Discover Interesting Accounts</h2>
          <p style="color: #57606a;">Not sure who to look up? Try one of the methods below to explore GitHub.</p>

          <div style="margin-top: 2rem;">
            <h3 style="margin-bottom: 1rem;">🎲 Roll the Dice</h3>
            <button onclick="handleRandomUser()" style="font-size: 1.1rem; padding: 0.75rem 1.5rem; background: var(--text-color);">Surprise Me (Random User)</button>
            <p style="font-size: 0.9rem; color: #57606a; margin-top: 0.5rem;">Fetches a completely random account ID from GitHub's database of users.</p>
          </div>

          <div style="margin-top: 2rem;">
            <h3 style="margin-bottom: 1rem;">⭐ Curated Suggestions</h3>
            ${ listsHtml }
          </div>

          <div style="margin-top: 2rem;">
            <h3 style="margin-bottom: 1rem;">🔥 API Search</h3>
            <button onclick="handleSearchTopUsers()" style="background: var(--hover-bg); color: var(--text-color); border: 1px solid var(--border-color);">Fetch Top Followed Global Users</button>
          </div>
        </div>`;
    };

    const handleRandomUser = async () => {
      mainContent.innerHTML = '<p>Loading a random user...</p>';
      try {
        const options = getFetchOptions( true );
        for ( let attempt = 0; attempt < 8; attempt++ ) {
          const randomId = Math.floor( Math.random() * 100000000 ) + 1;
          const response = await fetch( `https://api.github.com/user/${ randomId }`, options );
          if ( response.ok ) {
            const data = await response.json();
            if ( data.login ) { ownerInput.value = data.login; handleFetchRepos(); return; }
          } else if ( response.status !== 404 ) {
            throw new Error( `HTTP ${ response.status }` );
          }
        }
        mainContent.innerHTML = '<p class="error">Unable to find a random user after several attempts. Try again.</p>';
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        mainContent.innerHTML = `<p class="error">Error: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    const handleSearchTopUsers = async () => {
      mainContent.innerHTML = '<p>Searching GitHub for the most followed accounts...</p>';
      try {
        const options = getFetchOptions( true );
        const response = await fetch( 'https://api.github.com/search/users?q=followers:>20000&sort=followers&order=desc&per_page=30', options );
        if ( !response.ok ) throw new Error( `HTTP ${ response.status }` );
        const data = await response.json();

        const cardsHtml = data.items.map( user => `
          <div style="background: var(--secondary-bg); border: 1px solid var(--border-color); padding: 1rem; border-radius: 6px; text-align: center; cursor: pointer; transition: background 0.2s;"
               data-login="${ escapeAttribute( user.login ) }"
               onclick="ownerInput.value=this.dataset.login; handleFetchRepos();"
               onmouseover="this.style.background='var(--hover-bg)'"
               onmouseout="this.style.background='var(--secondary-bg)'">
            <img src="${ escapeAttribute( user.avatar_url ) }" style="width: 64px; height: 64px; border-radius: 50%; margin-bottom: 0.5rem; border: 1px solid var(--border-color);">
            <div style="font-weight: bold; color: var(--highlight-color); font-size: 1.1rem;">${ escapeHTML( user.login ) }</div>
          </div>` ).join( '' );

        mainContent.innerHTML = `<div style="padding: 1rem;">
          <h3 style="margin-top: 0;">Top Followed Global Users</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">${ cardsHtml }</div>
        </div>`;
      } catch ( error ) {
        if ( error.name === 'AbortError' ) return;
        mainContent.innerHTML = `<p class="error">Error searching users: ${ escapeHTML( error.message ) }</p>`;
      }
    };

    // ── Event delegation ──────────────────────────────────────────────────────

    repoList.addEventListener( 'click', e => {
      const el = e.target.closest( '[data-action]' );
      if ( !el ) return;
      const { action } = el.dataset;
      if ( action === 'select-repo' ) handleSelectRepo( el.dataset.repo );
      else if ( action === 'select-owner' ) { ownerInput.value = el.dataset.owner; handleFetchRepos(); }
      else if ( action === 'select-gist' ) handleSelectGist( el.dataset.gistId );
      else if ( action === 'load-more-repos' ) handleFetchRepos( false, Number( el.dataset.page ) );
      else if ( action === 'load-more-orgs' ) handleFetchOrgs( Number( el.dataset.page ) );
      else if ( action === 'load-more-gists' ) handleFetchGists( Number( el.dataset.page ) );
    } );

    treeList.addEventListener( 'click', e => {
      const el = e.target.closest( '[data-action="select-file"]' );
      if ( el ) handleSelectFile( el.dataset.path );
    } );

    // ── Keyboard navigation in tree ────────────────────────────────────────────

    document.addEventListener( 'keydown', e => {
      const active = document.activeElement;
      if ( !active || ( !active.classList.contains( 'tree-folder' ) && !active.classList.contains( 'tree-item' ) ) ) return;
      if ( ![ 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' ' ].includes( e.key ) ) return;
      if ( e.key !== 'Enter' || active.classList.contains( 'tree-item' ) ) e.preventDefault();

      const getVisible = () => Array.from( document.querySelectorAll( '.tree-folder, .tree-item' ) ).filter( node => {
        if ( node.offsetWidth === 0 && node.offsetHeight === 0 ) return false;
        let p = node.parentElement;
        while ( p ) {
          if ( p.tagName === 'DETAILS' && !p.open ) {
            if ( !( node.parentElement === p && node.tagName === 'SUMMARY' ) ) return false;
          }
          p = p.parentElement;
        }
        return true;
      } );

      const autoLoadFile = el => {
        if ( el.classList.contains( 'tree-item' ) && el.dataset.path ) {
          handleSelectFile( el.dataset.path );
        }
      };

      if ( e.key === 'ArrowDown' ) {
        const nodes = getVisible(), idx = nodes.indexOf( active );
        if ( idx >= 0 && idx < nodes.length - 1 ) { nodes[ idx + 1 ].focus(); autoLoadFile( nodes[ idx + 1 ] ); }
      } else if ( e.key === 'ArrowUp' ) {
        const nodes = getVisible(), idx = nodes.indexOf( active );
        if ( idx > 0 ) { nodes[ idx - 1 ].focus(); autoLoadFile( nodes[ idx - 1 ] ); }
      } else if ( e.key === 'ArrowRight' && active.classList.contains( 'tree-folder' ) ) {
        const details = active.parentElement;
        if ( !details.open ) { details.open = true; }
        else { const nodes = getVisible(), idx = nodes.indexOf( active ); if ( idx >= 0 && idx < nodes.length - 1 ) nodes[ idx + 1 ].focus(); }
      } else if ( e.key === 'ArrowLeft' ) {
        if ( active.classList.contains( 'tree-folder' ) ) {
          const details = active.parentElement;
          if ( details.open ) { details.open = false; }
          else { const pd = details.parentElement.closest( 'details' ); if ( pd ) pd.querySelector( '.tree-folder' ).focus(); }
        } else {
          const pd = active.closest( 'details' );
          if ( pd ) pd.querySelector( '.tree-folder' ).focus();
        }
      } else if ( e.key === 'Enter' || e.key === ' ' ) {
        if ( active.classList.contains( 'tree-item' ) ) {
          const filePath = active.dataset.path;
          if ( filePath ) handleSelectFile( filePath );
        } else if ( e.key === ' ' ) {
          active.parentElement.open = !active.parentElement.open;
        }
      }
    } );

    // ── Resizable sidebar ─────────────────────────────────────────────────────

    const dragMe = document.getElementById( 'dragMe' );
    const sidebar = document.querySelector( '.sidebar' );
    let isResizing = false;

    dragMe.addEventListener( 'pointerdown', e => {
      isResizing = true;
      dragMe.classList.add( 'resizing' );
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      dragMe.setPointerCapture( e.pointerId );
    } );

    document.addEventListener( 'pointermove', e => {
      if ( !isResizing ) return;
      const newWidth = e.clientX - sidebar.getBoundingClientRect().left;
      if ( newWidth > 40 ) sidebar.style.setProperty( '--sidebar-width', newWidth + 'px' );
    } );

    document.addEventListener( 'pointerup', e => {
      if ( !isResizing ) return;
      isResizing = false;
      dragMe.classList.remove( 'resizing' );
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      dragMe.releasePointerCapture( e.pointerId );
    } );

    // ── Global error handlers ─────────────────────────────────────────────────

    const errorPanel = ( title, msg ) => `
      <div style="padding: 1.5rem; background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 6px; margin: 1rem;">
        <h3 style="margin-top: 0;">⚠️ ${ title }</h3>
        <p>${ escapeHTML( msg ) }</p>
        <button onclick="location.reload()" style="margin-top: 1rem; background: #c62828; color: white;">Reload Page</button>
      </div>`;

    window.addEventListener( 'error', event => {
      mainContent.innerHTML = errorPanel(
        'Unexpected Error',
        event.error ? event.error.message : event.message
      );
    } );

    window.addEventListener( 'unhandledrejection', event => {
      if ( event.reason?.name === 'AbortError' ) return;
      mainContent.innerHTML = errorPanel(
        'Unexpected Async Error',
        event.reason ? event.reason.message : 'Unknown error'
      );
    } );

    // ── Init ──────────────────────────────────────────────────────────────────

    ownerInput.value = CONFIG.owner;
    state.owner = CONFIG.owner;
    updateRecentUsers();
    if ( location.hash ) {
      handleHashChange();
    } else {
      handleFetchRepos();
    }
  </script>

</body>

</html>
