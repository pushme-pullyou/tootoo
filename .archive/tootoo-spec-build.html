<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TooToo GitHub Browser</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ── CSS custom properties ───────────────────────────── */
    :root {
      --primary-bg:    #f6f8fa;
      --secondary-bg:  #ffffff;
      --text-color:    #24292f;
      --border-color:  #d0d7de;
      --highlight-color: #0969da;
      --hover-bg:      #f3f4f6;
      --font-family:   -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --sidebar-width: 260px;
    }

    /* ── Reset / base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      background: var(--primary-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--secondary-bg);
      border-bottom: 1px solid var(--border-color);
    }

    #appTitle {
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      user-select: none;
    }

    #ownerInput {
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: var(--font-family);
      width: 180px;
    }

    button {
      padding: 0.35rem 0.9rem;
      background: var(--highlight-color);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: var(--font-family);
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }

    #btnGhProfile {
      background: transparent;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 0.35rem 0.5rem;
      display: flex;
      align-items: center;
    }

    #btnDiscover {
      background: var(--text-color);
      color: var(--primary-bg);
    }

    #btnExpandAll { display: none; }

    #btnToken {
      margin-left: auto;
      background: var(--secondary-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--secondary-bg);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .resizer {
      width: 8px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border-color);
      transition: background 0.15s;
      touch-action: none;
      z-index: 10;
    }
    .resizer:hover, .resizer.active { background: var(--highlight-color); }

    .content-area {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      overflow-x: auto;
      padding: 1rem 1.25rem;
      background: var(--primary-bg);
    }

    /* ── Sidebar components ──────────────────────────────── */
    .sidebar-heading {
      margin: 0 0 0.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #filterInput, #sortSelect {
      width: 100%;
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 5px;
      font-size: 0.85rem;
      font-family: var(--font-family);
      background: var(--secondary-bg);
    }

    #sortSelect { display: none; }

    #repoList {
      list-style: none;
      padding: 0;
      margin: 0.25rem 0 0;
    }

    .repo-item {
      padding: 0.25rem 0.4rem;
      border-radius: 4px;
      cursor: pointer;
      color: var(--highlight-color);
      font-size: 0.9rem;
    }
    .repo-item:hover { background: var(--hover-bg); text-decoration: underline; }

    .repo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      font-size: 0.7rem;
      color: #57606a;
      margin-top: 0.1rem;
    }

    .lang-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #navTree { display: none; }

    #treeTruncWarning {
      display: none;
      padding: 0.4rem 0.6rem;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      border-radius: 4px;
      font-size: 0.82rem;
      margin-bottom: 0.5rem;
    }

    #treeList { margin-top: 0.5rem; }

    /* Tree items */
    .tree-folder {
      font-family: monospace;
      font-weight: 700;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      user-select: none;
    }
    .tree-folder:hover { background: var(--hover-bg); }

    .tree-children { margin-left: 1rem; }

    .tree-file {
      font-family: monospace;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .tree-file:hover { background: var(--hover-bg); }

    .tree-file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .tree-file-size {
      font-size: 0.75rem;
      color: #57606a;
      flex-shrink: 0;
    }

    /* ── Content area components ─────────────────────────── */
    .file-header {
      position: sticky;
      top: 0;
      background: var(--primary-bg);
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      padding-bottom: 0.6rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }

    .file-title {
      margin: 0;
      font-size: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      font-weight: 600;
    }

    .file-path-prefix { font-weight: 400; opacity: 0.65; }

    .gh-link {
      color: var(--text-color);
      opacity: 0.6;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .gh-link:hover { opacity: 1; color: var(--highlight-color); }

    .file-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }

    .btn-sm {
      padding: 0.2rem 0.55rem;
      font-size: 0.82rem;
    }

    .view-toggle { display: none; gap: 0.3rem; }

    .markdown-body {
      padding: 1.5rem;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      line-height: 1.6;
      overflow-x: auto;
    }

    pre {
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .iframe-content {
      width: 100%;
      height: 80vh;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--secondary-bg);
    }

    img.media-img { max-width: 100%; border: 1px solid var(--border-color); border-radius: 4px; }

    audio, video { width: 100%; margin-top: 0.75rem; }

    .error-msg { color: #cf222e; }

    .md-parse-error {
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      color: #b71c1c;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    .error-panel {
      padding: 1.5rem;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      margin: 1rem;
    }
    .error-panel h3 { margin-top: 0; }

    /* ── Stats cards ─────────────────────────────────────── */
    .stats-card {
      padding: 1.5rem;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      max-width: 900px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.4rem;
      list-style: none;
      padding: 0;
      margin: 0;
      line-height: 1.8;
    }

    .lang-bar-track {
      height: 8px;
      background: var(--primary-bg);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 2px;
    }

    .lang-bar-fill { height: 100%; background: var(--highlight-color); }

    /* ── Discover card ───────────────────────────────────── */
    .discover-card {
      max-width: 800px;
      margin: 0 auto;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.75rem;
      line-height: 1.6;
    }

    .discover-card h2 { margin-top: 0; }

    .pill-btn {
      background: var(--hover-bg);
      color: var(--highlight-color);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .pill-btn:hover { background: var(--border-color); }

    .top-user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .top-user-card {
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .top-user-card:hover { background: var(--hover-bg); }

    .top-user-card img {
      width: 64px; height: 64px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border-color);
    }

    .top-user-card .login {
      font-weight: 700;
      color: var(--highlight-color);
    }
  </style>
</head>
<body>

<header>
  <span id="appTitle"
    onclick="history.replaceState(null,'',location.pathname+location.search); location.reload();"
    title="Reload TooToo">TooToo</span>

  <input id="ownerInput" type="text" placeholder="GitHub user or org"
    autocomplete="off" list="recentUsersList"
    onfocus="this.select()"
    oninput="resetToReposMode()"
    onchange="handleOwnerChange()" />
  <datalist id="recentUsersList"></datalist>

  <button id="btnGhProfile" title="Open GitHub profile"
    onclick="openGhProfile()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
        -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
        .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
        -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.7 7.7 0 0 1 8 4.07c.68 0
        1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
        1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
        1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </button>

  <button id="btnMainAction" onclick="handleFetchRepos()">Get Repos</button>
  <button id="btnGetOrgs" onclick="handleFetchOrgs()">Get Orgs</button>
  <button id="btnGetGists" onclick="handleFetchGists()">Get Gists</button>
  <button id="btnStats" onclick="handleStats()">Stats</button>
  <button id="btnDiscover" onclick="showDiscover()">🌍 Discover</button>
  <button id="btnExpandAll" onclick="toggleAllFolders()">Expand All</button>

  <button id="btnToken" onclick="promptToken()">⚙️ Token</button>
</header>

<main>
  <div class="sidebar" id="sidebar">

    <div id="repoListContainer">
      <h3 class="sidebar-heading" id="listHeading">Repositories</h3>
      <input id="filterInput" type="text" placeholder="Filter…" oninput="filterRepoList()" />
      <select id="sortSelect" onchange="sortRepoList()">
        <option value="updated">Sort: Recently Updated</option>
        <option value="stars">Sort: Stars</option>
        <option value="name">Sort: Name</option>
        <option value="pushed">Sort: Last Push</option>
        <option value="size">Sort: Size</option>
      </select>
      <ul id="repoList"></ul>
    </div>

    <div id="navTree">
      <h3 class="sidebar-heading" id="treeHeading">Files</h3>
      <div id="treeTruncWarning">⚠️ Repository too large — tree is truncated.</div>
      <div id="treeList"></div>
    </div>

  </div>

  <div class="resizer" id="resizer"></div>

  <div class="content-area" id="mainContent">
    <p>Enter a GitHub username or org and click <strong>Get Repos</strong> to begin.</p>
  </div>
</main>

<script>
'use strict';

// ── Security ──────────────────────────────────────────────────────────────────

const esc = str => String(str ?? '').replace(/[&<>'"]/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]
));

// ── Constants & config ────────────────────────────────────────────────────────

const LARGE_FILE_BYTES = 1024 * 1024;

const LANG_COLORS = {
  JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5', Java:'#b07219',
  'C++':'#f34b7d', C:'#555555', 'C#':'#178600', Go:'#00ADD8', Rust:'#dea584',
  Ruby:'#701516', PHP:'#4F5D95', Swift:'#F05138', Kotlin:'#A97BFF', Dart:'#00B4AB',
  Shell:'#89e051', HTML:'#e34c26', CSS:'#563d7c', SCSS:'#c6538c', Vue:'#41b883',
  Svelte:'#ff3e00', Lua:'#000080', R:'#198CE7', Jupyter:'#DA5B0B', Dockerfile:'#384d54',
  Makefile:'#427819', Elixir:'#6e4a7e', Haskell:'#5e5086', Scala:'#c22d40',
  Perl:'#0298c3', Zig:'#ec915c', Nim:'#ffc200', OCaml:'#3be133'
};

const CURATED = {
  'Creative Coding & 3D': ['mrdoob','pmndrs','greggman','d3','playcanvas'],
  'Massive Orgs':         ['microsoft','google','nasa','vercel','freeCodeCamp'],
  'Prolific Devs':        ['sindresorhus','tj','torvalds','ruanyf','gaearon']
};

// ── App state ─────────────────────────────────────────────────────────────────

const state = {
  owner: '',
  repo: '',
  branch: 'main',
  tree: [],
  isGist: false,
  currentFilePath: '',
  repoItems: [],
  repoRenderer: null
};

const approvedLargeFiles = new Set();

let ghToken = localStorage.getItem('githubToken') || '';
let abortCtrl = null;

const getHeaders = () => ghToken ? { Authorization: `token ${ghToken}` } : {};

const newFetch = (url, resetAbort = false) => {
  if (resetAbort) {
    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();
  }
  return fetch(url, { headers: getHeaders(), signal: abortCtrl?.signal });
};

// ── DOM refs ──────────────────────────────────────────────────────────────────

const $  = id => document.getElementById(id);
const ownerInput     = $('ownerInput');
const repoList       = $('repoList');
const repoListCont   = $('repoListContainer');
const navTree        = $('navTree');
const treeList       = $('treeList');
const mainContent    = $('mainContent');
const btnMainAction  = $('btnMainAction');
const btnExpandAll   = $('btnExpandAll');
const listHeading    = $('listHeading');
const treeHeading    = $('treeHeading');
const recentDL       = $('recentUsersList');
const sortSelect     = $('sortSelect');

// ── Utility ───────────────────────────────────────────────────────────────────

const fmtBytes = n => {
  if (n == null || isNaN(n)) return '';
  if (n < 1024) return `${n} B`;
  if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
  return `${(n/1024/1024).toFixed(1)} MB`;
};

const relTime = iso => {
  const days = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1d ago';
  if (days < 30) return `${days}d ago`;
  if (days < 365) return `${Math.floor(days/30)}mo ago`;
  return `${Math.floor(days/365)}y ago`;
};

// ── Recent users ──────────────────────────────────────────────────────────────

const loadRecentUsers = () => {
  const users = JSON.parse(localStorage.getItem('tootooRecentUsers') || '[]');
  recentDL.innerHTML = users.map(u => `<option value="${esc(u)}">`).join('');
  return users;
};

const saveRecentUser = user => {
  let users = JSON.parse(localStorage.getItem('tootooRecentUsers') || '[]');
  users = [user, ...users.filter(u => u !== user)].slice(0, 10);
  localStorage.setItem('tootooRecentUsers', JSON.stringify(users));
  loadRecentUsers();
};

// ── Token ─────────────────────────────────────────────────────────────────────

const promptToken = () => {
  const t = prompt('GitHub Personal Access Token\n(blank to clear, for higher rate limits)', ghToken);
  if (t !== null) { localStorage.setItem('githubToken', t.trim()); location.reload(); }
};

// ── Error helpers ─────────────────────────────────────────────────────────────

const showError = msg => { mainContent.innerHTML = `<p class="error-msg">⚠️ ${esc(msg)}</p>`; };

const showErrorPanel = (title, msg, detail = '') => {
  mainContent.innerHTML = `
    <div class="error-panel">
      <h3>⚠️ ${esc(title)}</h3>
      <p>${esc(msg)}</p>
      ${detail ? `<p style="font-size:0.85rem;opacity:0.8">${esc(detail)}</p>` : ''}
      <button onclick="location.reload()" style="margin-top:1rem;background:#c62828">Reload Page</button>
    </div>`;
};

const rateHint = err => err.message.includes('403')
  ? err.message + ' (Rate limited — add a token via ⚙️ Token)'
  : err.message;

// ── Hash routing ──────────────────────────────────────────────────────────────

const pushHash = hash => { if (location.hash !== hash) history.pushState(null, '', hash); };

const updateHash = () => {
  if (state.isGist) {
    pushHash(`#gist/${state.repo}${state.currentFilePath ? '/'+state.currentFilePath : ''}`);
  } else {
    let h = `#${state.owner}`;
    if (state.repo) { h += `/${state.repo}`; if (state.currentFilePath) h += `/${state.currentFilePath}`; }
    pushHash(h);
  }
};

const handleHashChange = async () => {
  const raw = location.hash.replace(/^#\/?/, '');
  if (!raw) { handleFetchRepos(); return; }

  const parts = raw.split('/');

  if (parts[0] === 'gist') {
    const gistId = parts[1];
    const fp = parts.slice(2).join('/');
    if (gistId && state.repo !== gistId) await handleSelectGist(gistId, !fp);
    if (fp && state.currentFilePath !== fp) await handleSelectFile(fp, false);
    return;
  }

  const [owner, repo, ...rest] = parts;
  const fp = rest.join('/');

  if (owner && owner !== state.owner) {
    ownerInput.value = owner;
    await handleFetchRepos(false);
  }
  if (repo && state.repo !== repo) await handleSelectRepo(repo, !fp);
  if (fp && state.currentFilePath !== fp) await handleSelectFile(fp, false);
};

window.addEventListener('popstate',   handleHashChange);
window.addEventListener('hashchange', handleHashChange);

// ── Button / UI state ─────────────────────────────────────────────────────────

const openGhProfile = () => {
  const owner = ownerInput.value.trim();
  if (owner) window.open(`https://github.com/${owner}`, '_blank', 'noopener');
};

const resetToReposMode = () => {
  btnMainAction.textContent = 'Get Repos';
  btnMainAction.onclick = handleFetchRepos;
  $('btnGetOrgs').style.display  = '';
  $('btnGetGists').style.display = '';
};

const enterTreeMode = branchSelectHtml => {
  repoListCont.style.display = 'none';
  navTree.style.display = 'block';
  treeHeading.innerHTML = `Files ${branchSelectHtml}`;
  btnMainAction.textContent = '← Back to Repos';
  btnMainAction.onclick = handleBackToRepos;
  $('btnGetOrgs').style.display  = 'none';
  $('btnGetGists').style.display = 'none';
  btnExpandAll.style.display = '';
  btnExpandAll.textContent = 'Expand All';
  btnExpandAll.dataset.expanded = 'false';
};

const handleBackToRepos = () => {
  state.repo = '';
  state.currentFilePath = '';
  updateHash();
  repoListCont.style.display = '';
  navTree.style.display = 'none';
  btnExpandAll.style.display = 'none';
  resetToReposMode();
  mainContent.innerHTML = '<p>Select a repository.</p>';
};

// ── Generic paginated list fetcher ────────────────────────────────────────────

const fetchList = async cfg => {
  const owner = ownerInput.value.trim();
  if (!owner) return;

  if (cfg.page === 1) {
    ownerInput.blur();
    state.owner = owner;
    state.isGist = !!cfg.isGist;

    if (cfg.onFirstReset) cfg.onFirstReset();

    listHeading.textContent = cfg.label;
    repoList.innerHTML = '';
    $('filterInput').value = '';
    sortSelect.style.display = 'none';
    repoListCont.style.display = '';
    navTree.style.display = 'none';
    btnExpandAll.style.display = 'none';
    resetToReposMode();
    mainContent.innerHTML = `<p>Loading ${cfg.label.toLowerCase()}…</p>`;
  }

  try {
    const res = await newFetch(cfg.url, cfg.page === 1);
    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
    const items = await res.json();

    // Remove old "load more" button
    const old = $(cfg.moreId);
    if (old) old.remove();

    const html = items.map(cfg.renderItem).join('');
    if (cfg.page > 1) repoList.insertAdjacentHTML('beforeend', html);
    else repoList.innerHTML = html;

    if (cfg.storeItems) {
      if (cfg.page > 1) state.repoItems.push(...items);
      else state.repoItems = [...items];
      state.repoRenderer = cfg.renderItem;
      sortSelect.style.display = '';
    }

    saveRecentUser(owner);

};

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

                return `<div>

                  </div>

                    <div class="lang-bar-fill" style="width:${pct}%"></div>

        <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem">
          <img src="${esc(data.owner.avatar_url)}" style="width:48px;height:48px;border-radius:50%">

        </div>

        <ul class="stats-grid">
          <li>⭐ <strong>Stars:</strong> ${data.stargazers_count}</li>
          <li>👁 <strong>Watchers:</strong> ${data.watchers_count}</li>
          <li>🔀 <strong>Forks:</strong> ${data.forks_count}</li>
          <li>🐛 <strong>Issues:</strong> ${data.open_issues_count}</li>
          <li>💻 <strong>Language:</strong> ${esc(data.language ?? 'N/A')}</li>
          <li>⚖️ <strong>License:</strong> ${data.license ? esc(data.license.name) : 'None'}</li>
          <li>🕒 <strong>Created:</strong> ${new Date(data.created_at).toLocaleDateString()}</li>
          <li>🔄 <strong>Updated:</strong> ${new Date(data.updated_at).toLocaleDateString()}</li>
          <li>📦 <strong>Size:</strong> ${(data.size/1024).toFixed(2)} MB</li>
          ${data.homepage ? `<li>🌐 <strong>Site:</strong> <a href="${esc(data.homepage.startsWith('http')?data.homepage:'https://'+data.homepage)}" target="_blank" rel="noopener" style="color:var(--highlight-color)">${esc(data.homepage)}</a></li>` : ''}
          <li>📄 <strong>Pages:</strong> ${data.has_pages ? 'Enabled' : 'Disabled'}</li>
        </ul>

    } else {
      html = `<div class="stats-card">
        <div style="display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem">
          <img src="${esc(data.avatar_url)}" style="width:80px;height:80px;border-radius:50%;box-shadow:0 0 0 1px var(--border-color)">
          <div>
            <h2 style="margin:0">
              <a href="${esc(data.html_url)}" target="_blank" rel="noopener"
                style="color:var(--highlight-color);text-decoration:none">${esc(data.name || data.login)}</a>
              <small style="color:#57606a;font-weight:400"> @${esc(data.login)}</small>

const handleSelectRepo = async (repoName, autoReadme = true, branch = null) => {
  state.repo = repoName;
  state.branch = branch || 'main';
  state.currentFilePath = '';
  if (autoReadme) updateHash();
  mainContent.innerHTML = `<p>Loading <strong>${esc(repoName)}</strong>…</p>`;

  try {
    // Resolve default branch if not specified
    if (!branch) {
      const r = await newFetch(`https://api.github.com/repos/${state.owner}/${repoName}`, true);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      state.branch = (await r.json()).default_branch;
    }

    // Fetch branch list for selector
    let branchSelectHtml = '';
    const br = await newFetch(`https://api.github.com/repos/${state.owner}/${repoName}/branches?per_page=100`);
    if (br.ok) {
      const branches = await br.json();
      branchSelectHtml = `<select
        data-repo="${esc(repoName)}"
        onchange="handleSelectRepo(this.dataset.repo, true, this.value)"
        style="margin-left:.4rem;padding:.2rem;border-radius:4px;max-width:130px;font-size:.85rem">
        ${branches.map(b =>
          `<option value="${esc(b.name)}"${b.name===state.branch?' selected':''}>${esc(b.name)}</option>`
        ).join('')}
      </select>`;
    }

    // Fetch recursive tree
    const tr = await newFetch(
      `https://api.github.com/repos/${state.owner}/${repoName}/git/trees/${state.branch}?recursive=1`
    );
    if (!tr.ok) throw new Error(`HTTP ${tr.status}`);
    const treeData = await tr.json();

    $('treeTruncWarning').style.display = treeData.truncated ? '' : 'none';
    state.tree = treeData.tree || [];

    enterTreeMode(branchSelectHtml);
    renderTree(state.tree);

    // Auto-open README — spec: does NOT update the hash
    if (autoReadme) {
      const readme = state.tree.find(
        item => item.type === 'blob' && /^readme(\.md|\.txt)?$/i.test(item.path.split('/').pop())
      );
      if (readme) {
        handleSelectFile(readme.path, false);  // false = don't update hash
      } else {
        mainContent.innerHTML = `<p>Repo: <strong>${esc(repoName)}</strong> · branch: ${esc(state.branch)}</p>`;
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') return;
    showError(rateHint(err));
  }
};

// ── Tree rendering ────────────────────────────────────────────────────────────

const renderTree = items => {
  // Build nested object from flat path list
  const root = {};
  items.forEach(item => {
    const parts = item.path.split('/');
    let node = root;
    parts.forEach((part, i) => {
      if (!node[part]) node[part] = { _isLeaf: i === parts.length-1, _item: item, _children: {} };
      node = node[part]._children;
    });
  });

  const buildHtml = node => {
    const keys = Object.keys(node);
    // Folders before files, then alphabetical within each group
    keys.sort((a, b) => {
      const aFolder = !node[a]._isLeaf;
      const bFolder = !node[b]._isLeaf;
      if (aFolder !== bFolder) return aFolder ? -1 : 1;
      return a.localeCompare(b, undefined, { sensitivity: 'base' });
    });

    return keys.map(key => {
      const child = node[key];
      if (!child._isLeaf) {
        return `<details>
          <summary class="tree-folder" tabindex="0">📁 ${esc(key)}</summary>
          <div class="tree-children">${buildHtml(child._children)}</div>
        </details>`;
      }
      const size = child._item.size != null ? `<span class="tree-file-size">${fmtBytes(child._item.size)}</span>` : '';
      return `<div class="tree-file" tabindex="0"
        data-action="select-file" data-path="${esc(child._item.path)}">
        <span class="tree-file-name">📄 ${esc(key)}</span>${size}
      </div>`;
    }).join('');
  };

  treeList.innerHTML = buildHtml(root);
};

// ── File viewer ───────────────────────────────────────────────────────────────

const toggleView = view => {
  const rendered = $('viewRendered');
  const raw      = $('viewRaw');
  const btnR     = $('btnRendered');
  const btnRaw   = $('btnRaw');
  const isRaw = view === 'raw';
  if (rendered) rendered.style.display = isRaw ? 'none' : '';
  if (raw)      raw.style.display      = isRaw ? '' : 'none';
  if (btnR)   btnR.style.opacity   = isRaw ? '0.5' : '1';
  if (btnRaw) btnRaw.style.opacity = isRaw ? '1' : '0.5';
};

const buildFileContent = async (ext, url, path, signal) => {
  const opts = { signal };
  let rendered = '', raw = '', showToggle = false;

  const images = ['png','jpg','jpeg','gif','webp','svg','ico'];
  const audio  = ['mp3','wav','ogg'];
  const video  = ['mp4','webm'];

  if (images.includes(ext)) {
    rendered = `<img class="media-img" src="${esc(url)}" alt="${esc(path)}">`;
    if (ext === 'svg') {
      const r = await fetch(url, opts);
      raw = `<pre><code>${esc(await r.text())}</code></pre>`;
      showToggle = true;
    }
  } else if (audio.includes(ext)) {
    rendered = `<audio controls src="${esc(url)}"></audio>`;
  } else if (video.includes(ext)) {
    rendered = `<video controls src="${esc(url)}"></video>`;
  } else if (ext === 'pdf') {
    const viewer = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
    rendered = `<iframe src="${esc(viewer)}" class="iframe-content"></iframe>`;
  } else {
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(`Could not load file (HTTP ${r.status})`);
    const text = await r.text();
    raw = `<pre><code class="language-${esc(ext)}">${esc(text)}</code></pre>`;

    if (ext === 'md') {
      try {
        rendered = `<div class="markdown-body">${marked.parse(text)}</div>`;
        showToggle = true;
      } catch (e) {
        rendered = `<div class="md-parse-error">⚠️ Markdown parse failed — showing raw text.</div>${raw}`;
      }
    } else if (['html','htm'].includes(ext)) {
      const blob = URL.createObjectURL(new Blob([text], {type:'text/html'}));
      rendered = `<iframe src="${blob}" sandbox="allow-scripts" class="iframe-content"></iframe>`;
      showToggle = true;
    } else {
      rendered = raw;
    }
  }

  return { rendered, raw, showToggle };
};

const handleSelectFile = async (path, doHash = true) => {
  try {
    const node = state.tree.find(n => n.path === path);
    const size = node?.size ?? node?.fileNode?.size ?? null;

    // Large file guard
    if (size != null && size >= LARGE_FILE_BYTES) {
      const key = `${state.owner}/${state.repo}/${state.branch}/${path}`;
      if (!approvedLargeFiles.has(key)) {
        const ok = confirm(`File is ${fmtBytes(size)} and may be slow to load.\n\nLoad ${path}?`);
        if (!ok) { mainContent.innerHTML = `<p>Skipped ${esc(path)}.</p>`; return; }
        approvedLargeFiles.add(key);
      }
    }

    state.currentFilePath = path;
    if (doHash) updateHash();
    mainContent.innerHTML = `<p>Loading ${esc(path)}…</p>`;

    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();
    const signal = abortCtrl.signal;

    const rawUrl = (state.isGist && node?.url)
      ? node.url
      : `https://raw.githubusercontent.com/${state.owner}/${state.repo}/${state.branch}/${path}`;

    const ext = path.split('.').pop().toLowerCase();

    const ghUrl = state.isGist
      ? `https://gist.github.com/${state.owner}/${state.repo}`
      : `https://github.com/${state.owner}/${state.repo}/blob/${state.branch}/${path}`;

    const newTabUrl = state.isGist
      ? rawUrl
      : `https://${state.owner}.github.io/${state.repo}/${path}`;

    // Build breadcrumb
    const segments = path.split('/');
    const fileName = segments.pop();
    const repoBack = state.isGist
      ? esc(state.repo)
      : `<a href="#${esc(state.owner)}/${esc(state.repo)}"
           style="color:var(--highlight-color);text-decoration:none;font-weight:400"
           data-owner="${esc(state.owner)}" data-repo="${esc(state.repo)}" data-branch="${esc(state.branch)}"
           onclick="event.preventDefault();history.pushState(null,'','#'+this.dataset.owner+'/'+this.dataset.repo);handleSelectRepo(this.dataset.repo,false,this.dataset.branch)"
         >${esc(state.repo)}</a>`;
    const prefix = segments.length ? esc(segments.join(' / ')) + ' / ' : '';

    const header = `<div class="file-header">
      <h3 class="file-title">
        <span class="file-path-prefix">${repoBack} / ${prefix}</span>${esc(fileName)}
        <a class="gh-link" href="${esc(ghUrl)}" target="_blank" rel="noopener" title="View on GitHub">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.7 7.7 0 0 1 8 4.07c.68 0
              1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
              1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
              1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </h3>
      <div class="file-actions">
        <button class="btn-sm" onclick="window.open('${esc(newTabUrl)}','_blank','noopener')">New Tab</button>
        <div id="viewToggleBar" class="view-toggle">
          <button id="btnRendered" class="btn-sm" onclick="toggleView('rendered')">Rendered</button>
          <button id="btnRaw"      class="btn-sm" onclick="toggleView('raw')" style="opacity:.5">Raw</button>
        </div>
      </div>
    </div>`;

    const { rendered, raw, showToggle } = await buildFileContent(ext, rawUrl, path, signal);

    mainContent.innerHTML = `${header}
      <div id="viewRendered">${rendered}</div>
      ${raw ? `<div id="viewRaw" style="display:none">${raw}</div>` : ''}`;

    if (showToggle) $('viewToggleBar').style.display = 'flex';

    try { if (window.hljs) hljs.highlightAll(); } catch(_) {}

    // Rewrite internal links in markdown
    if (ext === 'md' && !state.isGist) {
      const view = $('viewRendered');
      view.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        const blobPfx = `https://github.com/${state.owner}/${state.repo}/blob/`;
        if (href.startsWith(blobPfx)) {
          a.onclick = e => {
            e.preventDefault();
            let p = href.slice(blobPfx.length);
            const slash = p.indexOf('/');
            if (slash !== -1) p = p.slice(slash+1); // strip branch
            handleSelectFile(decodeURIComponent(p));
          };
        } else if (!href.startsWith('http') && !href.startsWith('mailto:') && !href.startsWith('#')) {
          a.onclick = e => {
            e.preventDefault();
            const [rel] = href.split('#');
            const base  = path.includes('/') ? path.split('/').slice(0,-1) : [];
            const out   = [...base];
            rel.split('/').forEach(s => {
              if (!s || s==='.') return;
              s==='..' ? out.pop() : out.push(s);
            });
            if (out.length) handleSelectFile(decodeURIComponent(out.join('/')));
          };
        } else if (!href.startsWith('#')) {
          a.target = '_blank'; a.rel = 'noopener';
        }
      });
    }
  } catch (err) {
    if (err.name === 'AbortError') return;
    showError(err.message);
  }
};

// ── Discover ──────────────────────────────────────────────────────────────────

const showDiscover = () => {
  repoListCont.style.display = 'none';
  navTree.style.display = 'none';
  btnExpandAll.style.display = 'none';
  $('btnGetOrgs').style.display  = 'none';
  $('btnGetGists').style.display = 'none';

  btnMainAction.textContent = '← Back to Search';
  btnMainAction.onclick = () => {
    resetToReposMode();
    repoListCont.style.display = '';
    mainContent.innerHTML = ownerInput.value.trim()
      ? `<p>Click <strong>Get Repos</strong> to load repos for ${esc(ownerInput.value.trim())}.</p>`
      : '';
  };

  const curatedHtml = Object.entries(CURATED).map(([cat, users]) => `
    <div style="margin-bottom:1.25rem">
      <h4 style="margin:0 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid var(--border-color)">${esc(cat)}</h4>
      <div style="display:flex;flex-wrap:wrap;gap:.4rem">
        ${users.map(u => `<button class="pill-btn"
          onclick="ownerInput.value='${esc(u)}';resetToReposMode();handleFetchRepos()">${esc(u)}</button>`).join('')}
      </div>
    </div>`).join('');

  mainContent.innerHTML = `<div class="discover-card">
    <h2>🌍 Discover Interesting Accounts</h2>
    <p style="color:#57606a">Not sure who to explore? Pick a method below.</p>

    <div style="margin-top:1.75rem">
      <h3>🎲 Roll the Dice</h3>
      <button onclick="handleRandomUser()" style="background:var(--text-color);font-size:1rem;padding:.6rem 1.25rem">
        Surprise Me (Random User)
      </button>
      <p style="color:#57606a;font-size:.88rem;margin-top:.5rem">Picks a random numeric GitHub user ID and fetches their repos.</p>
    </div>

    <div style="margin-top:1.75rem">
      <h3>⭐ Curated Suggestions</h3>
      ${curatedHtml}
    </div>

    <div style="margin-top:1.75rem">
      <h3>🔥 Top Followed Users</h3>
      <button onclick="handleSearchTopUsers()"
        style="background:var(--hover-bg);color:var(--text-color);border:1px solid var(--border-color)">
        Fetch Top Followed Global Users
      </button>
    </div>
  </div>`;
};

const handleRandomUser = async () => {
  mainContent.innerHTML = '<p>Looking for a random user…</p>';
  try {
    abortCtrl?.abort(); abortCtrl = new AbortController();
    for (let i = 0; i < 8; i++) {
      const id = Math.floor(Math.random() * 1e8) + 1;
      const r = await fetch(`https://api.github.com/user/${id}`,
        { headers: getHeaders(), signal: abortCtrl.signal });
      if (r.ok) {
        const d = await r.json();
        if (d.login) { ownerInput.value = d.login; handleFetchRepos(); return; }
      } else if (r.status !== 404) throw new Error(`HTTP ${r.status}`);
    }
    mainContent.innerHTML = '<p class="error-msg">Could not find a random user. Try again.</p>';
  } catch (err) {
    if (err.name === 'AbortError') return;
    showError(err.message);
  }
};

const handleSearchTopUsers = async () => {
  mainContent.innerHTML = '<p>Fetching top followed GitHub users…</p>';
  try {
    abortCtrl?.abort(); abortCtrl = new AbortController();
    const r = await fetch(
      'https://api.github.com/search/users?q=followers:>20000&sort=followers&order=desc&per_page=30',
      { headers: getHeaders(), signal: abortCtrl.signal }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const { items } = await r.json();

    mainContent.innerHTML = `
      <h3 style="margin-top:0">Top Followed Global Users</h3>
      <div class="top-user-grid">
        ${items.map(u => `
          <div class="top-user-card" data-login="${esc(u.login)}"
            onclick="ownerInput.value=this.dataset.login;resetToReposMode();handleFetchRepos()">
            <img src="${esc(u.avatar_url)}" alt="${esc(u.login)}">
            <div class="login">${esc(u.login)}</div>
          </div>`).join('')}
      </div>`;
  } catch (err) {
    if (err.name === 'AbortError') return;
    showError(err.message);
  }
};

// ── Event delegation ──────────────────────────────────────────────────────────

repoList.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action } = el.dataset;
  if      (action === 'select-repo')       handleSelectRepo(el.dataset.repo);
  else if (action === 'select-owner')     { ownerInput.value = el.dataset.owner; handleFetchRepos(); }
  else if (action === 'select-gist')       handleSelectGist(el.dataset.gistId);
  else if (action === 'load-more-repos')   handleFetchRepos(false, +el.dataset.page);
  else if (action === 'load-more-orgs')    handleFetchOrgs(+el.dataset.page);
  else if (action === 'load-more-gists')   handleFetchGists(+el.dataset.page);
});

treeList.addEventListener('click', e => {
  const el = e.target.closest('[data-action="select-file"]');
  if (el) handleSelectFile(el.dataset.path);
});

// ── Keyboard navigation in tree ───────────────────────────────────────────────

const navKeys = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' ']);

document.addEventListener('keydown', e => {
  const el = document.activeElement;
  if (!el) return;
  const isFolder = el.classList.contains('tree-folder');
  const isFile   = el.classList.contains('tree-file');
  if (!isFolder && !isFile) return;
  if (!navKeys.has(e.key)) return;
  e.preventDefault();

  const visible = () => [...document.querySelectorAll('.tree-folder,.tree-file')].filter(n => {
    let p = n.parentElement;
    while (p) {
      if (p.tagName === 'DETAILS' && !p.open) {
        if (n.tagName === 'SUMMARY' && n.parentElement === p) break;
        return false;
      }
      p = p.parentElement;
    }
    return true;
  });

  const nodes = visible();
  const idx   = nodes.indexOf(el);

  if (e.key === 'ArrowDown') { if (idx < nodes.length-1) nodes[idx+1].focus(); }
  else if (e.key === 'ArrowUp') { if (idx > 0) nodes[idx-1].focus(); }
  else if (e.key === 'ArrowRight' && isFolder) {
    const det = el.parentElement;
    if (!det.open) det.open = true;
    else if (idx < nodes.length-1) nodes[idx+1].focus();
  }
  else if (e.key === 'ArrowLeft') {
    if (isFolder) {
      const det = el.parentElement;
      if (det.open) det.open = false;
      else { const pd = det.parentElement?.closest('details'); if (pd) pd.querySelector('.tree-folder')?.focus(); }
    } else {
      const pd = el.closest('details'); if (pd) pd.querySelector('.tree-folder')?.focus();
    }
  }
  else if (e.key === 'Enter' || e.key === ' ') {
    if (isFile) el.click();
    else if (e.key === ' ') el.parentElement.open = !el.parentElement.open;
  }
});

// ── Resizable sidebar ─────────────────────────────────────────────────────────

const resizer = $('resizer');
const sidebar = document.querySelector('.sidebar');
let dragging  = false;

resizer.addEventListener('pointerdown', e => {
  dragging = true;
  resizer.classList.add('active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  resizer.setPointerCapture(e.pointerId);
});

document.addEventListener('pointermove', e => {
  if (!dragging) return;
  const w = e.clientX - sidebar.getBoundingClientRect().left;
  if (w > 60) sidebar.style.setProperty('--sidebar-width', w + 'px');
});

document.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  resizer.classList.remove('active');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  resizer.releasePointerCapture(e.pointerId);
});

// ── Global error handlers ─────────────────────────────────────────────────────

window.addEventListener('error', ev => {
  showErrorPanel('Unexpected Error', ev.error?.message ?? ev.message,
    ev.filename ? `${ev.filename.split('/').pop()} line ${ev.lineno}` : '');
});

window.addEventListener('unhandledrejection', ev => {
  if (ev.reason?.name === 'AbortError') return;
  showErrorPanel('Unhandled Async Error', ev.reason?.message ?? 'Unknown error');
});

// ── Boot ──────────────────────────────────────────────────────────────────────

loadRecentUsers();
if (location.hash) handleHashChange();
else handleFetchRepos();
</script>
