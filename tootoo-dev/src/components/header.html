<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="revised" content="2026-06-21 21:23">
  <title>TooToo — Header (lab)</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* Page-only scaffolding. Ignored by the assembler (outside @part). */
    .lab-note { margin: 1rem; padding: 0.75rem 1rem; border: 1px dashed var(--border-color);
      border-radius: 8px; background: var(--secondary-bg); font-size: 0.9rem; line-height: 1.5; }
    .lab-note code { background: var(--hover-bg); padding: 0 0.25rem; border-radius: 4px; }
    .lab-controls { margin: 0 1rem 1rem; padding: 0.75rem 1rem; border: 1px solid var(--border-color);
      border-radius: 8px; background: var(--secondary-bg); display: grid;
      grid-template-columns: max-content 1fr; gap: 0.5rem 0.75rem; align-items: center; max-width: 480px; }
    .lab-controls h2 { grid-column: 1 / -1; margin: 0 0 0.25rem; font-size: 1rem; }
    .lab-controls label { font-size: 0.85rem; opacity: 0.8; }
    .lab-controls input { font: inherit; padding: 0.2rem 0.4rem; }
  </style>
</head>

<body>

  <!-- @part:header:start -->
  <header>
    <button id="btnToggleSidebar" class="header-btn" title="Close sidebar (Ctrl/⌘ B)" aria-label="Toggle sidebar"
      aria-expanded="true">☰</button>
    <a id="headerGitHub" href="." title="View on GitHub" aria-label="View on GitHub">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path
          d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
        </path>
      </svg>
    </a>

    <a id="headerTitle" href="." title="Reload" aria-label="Reload page">TooToo</a>

    <span class="branch-control">
      <button id="btnBranch" class="branch-switcher" type="button" hidden
        aria-haspopup="listbox" aria-expanded="false" title="Switch branch">
        <span class="branch-glyph" aria-hidden="true">⎇</span>
        <span id="branchName"></span>
        <span class="branch-caret" aria-hidden="true">▾</span>
      </button>
      <div id="branchMenu" class="branch-menu" role="listbox" aria-label="Branches" hidden></div>
    </span>

    <button id="btnDarkMode" class="header-btn dark-mode-btn" title="Toggle Dark Mode"
      aria-label="Toggle dark mode">🌙</button>
    <button id="btnFontDec" class="header-btn" title="Decrease Font Size" aria-label="Decrease font size">A−</button>
    <button id="btnFontInc" class="header-btn" title="Increase Font Size" aria-label="Increase font size">A+</button>
    <button id="btnHelp" class="header-btn" title="About this app" aria-label="About this app"
      aria-pressed="false">?</button>
    <button id="btnToken" class="header-btn" title="GitHub API rate limit — click to set a token"
      aria-label="Set GitHub personal access token" aria-pressed="false">⚙️</button>
    <div id="rateBadge" class="rate-limit-badge" title="API Rate Limit" aria-live="polite"></div>
  </header>
  <!-- @part:header:end -->

  <div class="lab-note">
    🧪 <strong>Standalone header component.</strong> The real header bar, driven by
    <code>js/header.js</code> reading <code>CONFIG</code> (mock) + <code>meta[revised]</code>.
    Try 🌙 / A− / A+ / ? / ⚙️, hover the title for the tooltip, and use the controls
    below to mutate <code>CONFIG</code> live.
  </div>

  <div class="lab-controls">
    <h2>🎛️ Lab controls (mutate CONFIG)</h2>
    <label for="ctlAppName">appName</label>
    <input id="ctlAppName" type="text">
    <label for="ctlSubtitle">subtitle</label>
    <input id="ctlSubtitle" type="text" placeholder="(empty)">
    <label for="ctlColor">themeColor</label>
    <input id="ctlColor" type="color">
  </div>

  <!-- Component dependencies. -->
  <script src="../js/core.js"></script>
  <script src="../mock/mock-data.js"></script>
  <script src="../js/header.js"></script>

  <!-- Lab harness: seed control values, then mutate CONFIG + re-render. -->
  <script>
    initHeader();
    document.getElementById( 'ctlAppName' ).value = CONFIG.appName;
    document.getElementById( 'ctlSubtitle' ).value = CONFIG.subtitle;
    document.getElementById( 'ctlColor' ).value = CONFIG.themeColor;
    const reflect = ( id, key ) => document.getElementById( id ).addEventListener( 'input', ( e ) => {
      CONFIG[ key ] = e.target.value; updateHeaderFromConfig();
    } );
    reflect( 'ctlAppName', 'appName' );
    reflect( 'ctlSubtitle', 'subtitle' );
    reflect( 'ctlColor', 'themeColor' );
  </script>

</body>

</html>
