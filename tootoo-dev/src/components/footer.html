<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TooToo — Footer (dev)</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .dev-note {
      margin: 1rem;
      padding: 0.75rem 1rem;
      border: 1px dashed var(--border-color);
      border-radius: 8px;
      background: var(--secondary-bg);
      font-size: 0.9rem;
    }

    body {
      justify-content: space-between;
    }
  </style>
</head>

<body>

  <div class="dev-note">
    🧪 <strong>Footer component.</strong> A new page-level footer (the single-file
    app has none yet). Brand text comes from <code>CONFIG</code> via
    <code>renderFooter()</code>.
  </div>

  <!-- @part:footer:start -->
  <footer class="app-footer">
    <span class="app-footer-brand">
      <img class="app-footer-mark" width="18" height="18" alt="">
      <span id="footerCopyright"></span>
    </span>
    <a class="app-footer-license" href="https://opensource.org/licenses" target="_blank" rel="noopener">License</a>
  </footer>
  <!-- @part:footer:end -->

  <script src="../js/core.js"></script>
  <script src="../mock/mock-data.js"></script>
  <script src="../js/footer.js"></script>
  <script>renderFooter();</script>

</html>
