<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="revised" content="2026-04-09 08:30">
  <title>TooToo LT</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hljsTheme" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    /* ── Custom Properties ── */
    :root {
      --primary-bg: #f3f4f6;
      --secondary-bg: #ffffff;
      --text-color: #1f2937;
      --border-color: #d1d5db;
      --highlight-color: #2563eb;
      --hover-bg: #e5e7eb;
      --font-family: system-ui, -apple-system, sans-serif;
      --sidebar-width: 300px;
      --font-size: 16px;
    }

    /* ── Dark Mode Overrides ── */
    body.dark-mode {
      --primary-bg: #1f2937;
      --secondary-bg: #111827;
      --text-color: #f3f4f6;
      --border-color: #374151;
      --highlight-color: #3b82f6;
      --hover-bg: #374151;
    }

    /* ── Font size on html so rem units scale ── */
    html {
      font-size: var(--font-size);
    }

    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* ── Body ── */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: var(--font-family);
      color: var(--text-color);
      background-color: var(--primary-bg);
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--primary-bg);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    #headerGitHub {
      display: flex;
      align-items: center;
      color: var(--text-color);
      text-decoration: none;
    }

    #headerTitle {
      font-weight: bold;
      font-size: 1.1rem;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* ── Header Utility Buttons ── */
    .header-btn {
      background: var(--secondary-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    .header-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .header-btn:active {
      transform: translateY(0);
    }

    .dark-mode-btn {
      margin-left: auto;
    }

    /* ── Rate limit badge ── */
    .rate-limit-badge {
      display: none;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: var(--hover-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--primary-bg);
      padding: 0;
      overflow: hidden;
    }

    /* ── Panel Headers (shared) ── */
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--primary-bg);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 0.95rem;
    }

    /* ── Content area sticky header ── */
    .file-header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 0.5rem 1rem;
      background: var(--primary-bg);
    }

    /* ── Filter wrap ── */
    .filter-wrap {
      position: relative;
      margin: 0.4rem 0.5rem 0 0.5rem;
    }

    #treeFilter {
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      padding: 0.3rem 1.6rem 0.3rem 0.5rem;
      font-size: 0.85rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--secondary-bg);
      color: var(--text-color);
      outline: none;
    }

    #treeFilter:focus {
      border-color: var(--highlight-color);
    }

    #btnFilterClear {
      position: absolute;
      right: 0.3rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-color);
      opacity: 0.5;
      font-size: 0.9rem;
      display: none;
      padding: 0;
    }

    #btnFilterClear:hover {
      opacity: 1;
    }

    /* ── Tree list ── */
    #treeList {
      padding: 0 0.5rem;
      flex: 1;
      overflow-y: auto;
    }

    /* ── Resizer ── */
    .resizer {
      width: 8px;
      background: rgba(37, 99, 235, 0.7);
      cursor: col-resize;
      touch-action: none;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--highlight-color);
    }

    /* ── Content Area ── */
    .content-area {
      flex: 1;
      min-width: 0;
      padding: 0;
      overflow-y: auto;
      background: var(--secondary-bg);
      position: relative;
    }

    #contentBody {
      padding: 0 1rem 1rem 1rem;
      background: var(--secondary-bg);
    }

    /* ── Action Buttons (primary / secondary) ── */
    button.primary,
    button.secondary {
      background: var(--highlight-color);
      color: #ffffff;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    button.primary:hover,
    button.secondary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    button.primary:active,
    button.secondary:active {
      transform: translateY(0);
    }

    /* ── Back to Top ── */
    .back-to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 20;
      background-color: var(--highlight-color);
      color: #ffffff;
      border: none;
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      font-size: 1.2rem;
      display: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* ── Inline repo form ── */
    .repo-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 300px;
      padding: 1rem;
    }

    .repo-form label {
      font-size: 0.9rem;
      font-weight: bold;
    }

    .repo-form input {
      padding: 0.4rem 0.5rem;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--secondary-bg);
      color: var(--text-color);
      outline: none;
    }

    .repo-form input:focus {
      border-color: var(--highlight-color);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        width: 25% !important;
      }

      .resizer {
        width: 4px;
      }

      .file-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }

    /* ── Treeview ── */
    .tree-folder {
      display: flex;
      align-items: center;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      user-select: none;
      list-style: none;
    }

    .tree-folder::-webkit-details-marker {
      display: none;
    }

    .tree-folder:hover {
      background: var(--hover-bg);
    }

    .tree-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.2rem 0.4rem 0.2rem 1.2rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    .tree-item:hover {
      background: var(--hover-bg);
    }

    .tree-item.active {
      background: var(--highlight-color);
      color: #fff;
    }

    .tree-item-size {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-left: 0.5rem;
      white-space: nowrap;
    }

    details details {
      padding-left: 0.8rem;
    }

    details {
      padding-left: 0;
    }

    /* ── Content Viewer CSS ── */
    .markdown-body {
      max-width: 700px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }

    pre {
      max-width: 700px;
      overflow-x: auto;
      padding: 1rem;
      border-radius: 6px;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    body.dark-mode .markdown-body {
      color: var(--text-color);
    }

    body.dark-mode pre {
      background-color: var(--secondary-bg);
    }

    .panel-header.file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: var(--secondary-bg);
    }

    .file-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
      flex-wrap: wrap;
    }

    .file-title a.breadcrumb-link {
      color: var(--highlight-color);
      cursor: pointer;
      text-decoration: none;
    }

    .file-title a.breadcrumb-link:hover {
      text-decoration: underline;
    }

    .file-actions {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-shrink: 0;
    }

    .file-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background: var(--secondary-bg);
      color: var(--text-color);
    }

    .file-btn:hover {
      opacity: 0.88;
    }

    .media-content {
      max-width: 100%;
      border-radius: 4px;
    }

    .iframe-content {
      width: 100%;
      height: 70vh;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: #fff;
    }

    .xlsx-sheet table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1rem;
    }

    .xlsx-sheet td,
    .xlsx-sheet th {
      border: 1px solid var(--border-color);
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
    }

    .xlsx-sheet th {
      background: var(--primary-bg);
      font-weight: bold;
    }

    .md-error {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    body.dark-mode .md-error {
      background: #3a3000;
      border-color: #665200;
    }

    .error-panel {
      background: #fff0f0;
      border: 2px solid #dc3545;
      padding: 1rem;
      border-radius: 6px;
      margin: 1rem;
      font-size: 0.9rem;
    }

    .error-panel button {
      margin-top: 0.5rem;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--secondary-bg);
      cursor: pointer;
    }

    body.dark-mode .error-panel {
      background: #2d0000;
      border-color: #ff6b6b;
      color: var(--text-color);
    }
  </style>
</head>

<body>

    <a id="headerGitHub" href="#" title="View on GitHub">

          d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">

  <main>

    <div class="sidebar">
      <div class="panel-header" title="Last updated: 2026-04-08 17:00">
        <h3 id="hFiles">Files</h3>
        <button id="btnExpandAll" class="secondary" style="display: none;" title="Expand All Folders">Expand
          All</button>
      </div>
      <div class="filter-wrap">
        <input type="text" id="treeFilter" placeholder="Filter files…" title="Filter files by name">
        <button id="btnFilterClear" title="Clear filter">✕</button>
      </div>

        <!-- placeholder for future tree content -->
      </div>
    </div>

    <div class="resizer" id="resizer" title="Drag to Resize Sidebar"></div>

    <div class="content-area" id="contentArea">
      <div class="panel-header file-header">
        <h3 id="contentTitle">Content</h3>
      </div>
      <div id="contentBody">
        <p>Awaiting repository detection...</p>
      </div>

      <button id="btnBackToTop" class="back-to-top" aria-label="Back to top" title="Back to Top">↑</button>
    </div>

  </main>

  <script>
    'use strict';

    /* ── 1. Utility ── */
    const escapeHTML = ( str ) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String( str ).replace( /[&<>"']/g, ( c ) => map[ c ] );
    };

    /* ── 2. CONFIG & state ── */
    const CONFIG = {
      owner: 'theo-armour',
      repo: 'sandbox',
      branch: '',
    };

    const state = {
      owner: '',
      repo: '',
      branch: '',
      tree: null,
      currentFilePath: '',
      pagesEnabled: null,
    };

    /* ── 3. Storage key helper ── */
    const storageKey = ( suffix ) => `tootoo-lt:${ location.pathname }:${ suffix }`;

    /* ── 4. Extension constants ── */
    const IMAGE_EXTS = [ 'png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico' ];
    const AUDIO_EXTS = [ 'mp3', 'wav', 'ogg' ];
    const VIDEO_EXTS = [ 'mp4', 'webm' ];
    const SHEET_EXTS = [ 'xlsx', 'xls', 'csv', 'ods' ];
    const STREAMABLE_EXTS = [ ...IMAGE_EXTS, ...AUDIO_EXTS, ...VIDEO_EXTS, 'pdf' ];
    const NO_COPY_EXTS = [ ...STREAMABLE_EXTS, ...SHEET_EXTS ];

    /* ── 5. Large file protection ── */
    const LARGE_FILE_WARNING_BYTES = 1024 * 1024;
    const approvedLargeFiles = new Set();

    /* ── 6. Blob URL cleanup ── */
    const activeBlobUrls = new Set();
    window.addEventListener( 'beforeunload', () => {
      activeBlobUrls.forEach( ( url ) => URL.revokeObjectURL( url ) );
    } );

    /* ── 7. File text cache ── */
    const FILE_CACHE_MAX_ENTRIES = 25;
    const FILE_CACHE_MAX_CHARS = 300000;
    const fileTextCache = new Map();

    const getFileCacheKey = ( path ) => `${ state.owner }/${ state.repo }/${ state.branch }/${ path }`;

    const getCachedFileText = ( path ) => {
      const key = getFileCacheKey( path );
      if ( !fileTextCache.has( key ) ) return null;
      const text = fileTextCache.get( key );
      // LRU refresh: move to end
      fileTextCache.delete( key );
      fileTextCache.set( key, text );
      return text;
    };

    const setCachedFileText = ( path, text ) => {
      if ( text.length > FILE_CACHE_MAX_CHARS ) return;
      const key = getFileCacheKey( path );
      // Remove if exists (for LRU ordering)
      fileTextCache.delete( key );
      // Evict oldest if at limit
      while ( fileTextCache.size >= FILE_CACHE_MAX_ENTRIES ) {
        const oldest = fileTextCache.keys().next().value;
        fileTextCache.delete( oldest );
      }
      fileTextCache.set( key, text );
      persistFileCache();
    };

    const persistFileCache = () => {
      try {
        const arr = Array.from( fileTextCache.entries() );
        localStorage.setItem( storageKey( 'fileTextCache' ), JSON.stringify( arr ) );
      } catch ( _ ) { /* quota exceeded — ignore */ }
    };

    const restoreFileCache = () => {
      try {
        const raw = localStorage.getItem( storageKey( 'fileTextCache' ) );
        if ( !raw ) return;
        const arr = JSON.parse( raw );
        if ( !Array.isArray( arr ) ) return;
        for ( const [ key, text ] of arr ) {
          if ( typeof key === 'string' && typeof text === 'string' ) {
            fileTextCache.set( key, text );
          }
        }
      } catch ( _ ) { /* ignore malformed cache */ }
    };

    /* ── 8. View preference helpers ── */
    const getViewPrefKey = ( ext ) => storageKey( `viewPref:${ ext }` );
    const getPreferredView = ( ext ) => localStorage.getItem( getViewPrefKey( ext ) ) || 'rendered';
    const setPreferredView = ( ext, view ) => localStorage.setItem( getViewPrefKey( ext ), view );

    /* ── 9. Dark mode hljs theme ── */
    const setHljsTheme = ( isDark ) => {
      const link = document.getElementById( 'hljsTheme' );
      link.href = isDark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    };

    /* ── 10. updateHeaderFromConfig ── */
    const updateHeaderFromConfig = () => {
      const label = `${ state.owner } / ${ state.repo }`;
      document.title = label;
      document.getElementById( 'headerTitle' ).textContent = label;
      document.getElementById( 'headerGitHub' ).href = `https://github.com/${ state.owner }/${ state.repo }`;
    };

    /* ── 11. detectRepo ── */
    const detectRepo = async () => {
      const params = new URLSearchParams( location.search );
      if ( params.get( 'owner' ) ) CONFIG.owner = params.get( 'owner' );
      if ( params.get( 'repo' ) ) CONFIG.repo = params.get( 'repo' );
      if ( params.get( 'branch' ) ) CONFIG.branch = params.get( 'branch' );

      if ( CONFIG.owner && CONFIG.repo ) return;

      const cached = localStorage.getItem( storageKey( 'repo' ) );
      if ( cached ) {
        try {
          const parsed = JSON.parse( cached );
          if ( parsed.owner && parsed.repo ) {
            CONFIG.owner = parsed.owner;
            CONFIG.repo = parsed.repo;
            return;
          }
        } catch ( _ ) { /* ignore malformed cache */ }
      }

      if ( location.protocol === 'http:' || location.protocol === 'https:' ) {
        const prefixes = [ '', '../', '../../', '../../../', '../../../../' ];
        for ( const prefix of prefixes ) {
          try {
            const res = await fetch( `${ prefix }.git/config` );
            if ( !res.ok ) continue;
            const text = await res.text();
            const match = text.match( /github\.com[:/]([^/\n]+)\/([^.\n]+)(\.git)?/ );
            if ( match ) {
              CONFIG.owner = match[ 1 ];
              CONFIG.repo = match[ 2 ];
              localStorage.setItem( storageKey( 'repo' ), JSON.stringify( { owner: CONFIG.owner, repo: CONFIG.repo } ) );
              return;
            }
          } catch ( _ ) { /* network error — try next prefix */ }
        }
      }

      return new Promise( ( resolve ) => {
        const cb = document.getElementById( 'contentBody' );
        cb.innerHTML = `
          <div class="repo-form">
            <p>Could not auto-detect the repository. Please enter the details below.</p>
            <label for="inpOwner">GitHub Owner</label>
            <input id="inpOwner" type="text" placeholder="e.g. octocat" autocomplete="off">
            <label for="inpRepo">Repository</label>
            <input id="inpRepo" type="text" placeholder="e.g. hello-world" autocomplete="off">
            <button id="btnSetRepo" class="primary">Set Repository</button>
          </div>
        `;

        document.getElementById( 'btnSetRepo' ).addEventListener( 'click', () => {
          const owner = document.getElementById( 'inpOwner' ).value.trim();
          const repo = document.getElementById( 'inpRepo' ).value.trim();
          if ( !owner || !repo ) return;
          CONFIG.owner = owner;
          CONFIG.repo = repo;
          localStorage.setItem( storageKey( 'repo' ), JSON.stringify( { owner, repo } ) );
          resolve();
        } );
      } );
    };

    /* ── 12. initAppearance ── */
    const initAppearance = () => {
      const isDark = localStorage.getItem( storageKey( 'darkMode' ) ) === 'true';
      if ( isDark ) {
        document.body.classList.add( 'dark-mode' );
        document.getElementById( 'btnDarkMode' ).textContent = '☀️';
      }
      setHljsTheme( isDark );

      const savedFontSize = localStorage.getItem( storageKey( 'fontSize' ) );
      if ( savedFontSize ) {
        document.documentElement.style.setProperty( '--font-size', savedFontSize );
      }

      const savedWidth = localStorage.getItem( storageKey( 'sidebarWidth' ) );
      if ( savedWidth ) {
        document.documentElement.style.setProperty( '--sidebar-width', savedWidth );
      }
    };

    /* ── 13. setupListeners ── */
    const setupListeners = () => {
      const contentArea = document.getElementById( 'contentArea' );

      // Dark mode toggle
      document.getElementById( 'btnDarkMode' ).addEventListener( 'click', () => {
        const isDark = document.body.classList.toggle( 'dark-mode' );
        document.getElementById( 'btnDarkMode' ).textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem( storageKey( 'darkMode' ), isDark );
        setHljsTheme( isDark );
      } );

      // Font size
      const getFontSize = () => {
        const val = getComputedStyle( document.documentElement ).getPropertyValue( '--font-size' );
        return parseInt( val, 10 ) || 16;
      };

      document.getElementById( 'btnFontInc' ).addEventListener( 'click', () => {
        const sz = Math.min( getFontSize() + 2, 28 );
        document.documentElement.style.setProperty( '--font-size', sz + 'px' );
        localStorage.setItem( storageKey( 'fontSize' ), sz + 'px' );
      } );

      document.getElementById( 'btnFontDec' ).addEventListener( 'click', () => {
        const sz = Math.max( getFontSize() - 2, 10 );
        document.documentElement.style.setProperty( '--font-size', sz + 'px' );
        localStorage.setItem( storageKey( 'fontSize' ), sz + 'px' );
      } );

      // Token prompt
      document.getElementById( 'btnToken' ).addEventListener( 'click', () => {
        const current = localStorage.getItem( 'githubToken' ) || '';
        const result = prompt( 'Enter your GitHub Personal Access Token (leave blank to clear):', current );
        if ( result !== null ) {
          localStorage.setItem( 'githubToken', result );
          location.reload();
        }
      } );

      // Resizable sidebar
      const resizer = document.getElementById( 'resizer' );
      let isResizing = false;

      resizer.addEventListener( 'pointerdown', ( e ) => {
        isResizing = true;
        resizer.setPointerCapture( e.pointerId );
        resizer.classList.add( 'dragging' );
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      } );

      resizer.addEventListener( 'pointermove', ( e ) => {
        if ( !resizer.hasPointerCapture( e.pointerId ) ) return;
        const newWidth = Math.min( Math.max( e.clientX, 100 ), window.innerWidth - 100 );
        document.documentElement.style.setProperty( '--sidebar-width', newWidth + 'px' );
      } );

      resizer.addEventListener( 'pointerup', ( e ) => {
        if ( !isResizing ) return;
        isResizing = false;
        resizer.releasePointerCapture( e.pointerId );
        resizer.classList.remove( 'dragging' );
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        const currentWidth = getComputedStyle( document.documentElement ).getPropertyValue( '--sidebar-width' ).trim();
        localStorage.setItem( storageKey( 'sidebarWidth' ), currentWidth );
      } );

      // Back to top
      const btnBackToTop = document.getElementById( 'btnBackToTop' );

      contentArea.addEventListener( 'scroll', () => {
        btnBackToTop.style.display = contentArea.scrollTop > 400 ? 'flex' : 'none';
      } );

      btnBackToTop.addEventListener( 'click', () => {
        contentArea.scrollTo( { top: 0, behavior: 'smooth' } );
      } );

      // Header title reload — clear state first
      document.getElementById( 'headerTitle' ).addEventListener( 'click', ( e ) => {
        e.preventDefault();
        localStorage.removeItem( storageKey( 'lastFilePath' ) );
        try { history.replaceState( null, '', location.pathname + location.search ); } catch ( _ ) { /* file:// */ }
        location.reload();
      } );
    };

    /* ── 14. Auth helpers (Public API) ── */
    const getToken = () => localStorage.getItem( 'githubToken' ) || '';

    const getAuthHeaders = () => {
      const headers = { Accept: 'application/vnd.github+json' };
      const token = getToken();
      if ( token ) headers.Authorization = `token ${ token }`;
      return headers;
    };

    /* ── 15. Rate limit badge (Public API) ── */
    const updateRateBadge = ( response ) => {
      const remaining = response.headers.get( 'X-RateLimit-Remaining' );
      const limit = response.headers.get( 'X-RateLimit-Limit' );
      if ( remaining !== null && limit !== null ) {
        const badge = document.getElementById( 'rateBadge' );
        badge.style.display = 'inline';
        badge.textContent = `${ remaining }/${ limit }`;
      }
    };

    /* ── 16. AbortController (Public API) ── */
    let currentAbortController = null;

    /* ── 17. File type icons ── */
    const getFileIcon = ( fileName ) => {
      const ext = fileName.includes( '.' ) ? '.' + fileName.split( '.' ).pop().toLowerCase() : '';
      const iconMap = {
        '.md': '📝',
        '.js': '🟨', '.mjs': '🟨', '.cjs': '🟨',
        '.ts': '🟦', '.tsx': '🟦',
        '.py': '🐍',
        '.html': '🌐', '.htm': '🌐',
        '.css': '🎨', '.scss': '🎨', '.less': '🎨',
        '.png': '🖼️', '.jpg': '🖼️', '.jpeg': '🖼️', '.gif': '🖼️', '.webp': '🖼️', '.svg': '🖼️', '.ico': '🖼️',
        '.mp3': '🎵', '.wav': '🎵', '.ogg': '🎵',
        '.mp4': '🎬', '.webm': '🎬',
        '.pdf': '📕',
        '.xlsx': '📊', '.xls': '📊', '.csv': '📊', '.ods': '📊',
        '.yaml': '⚙️', '.yml': '⚙️', '.toml': '⚙️',
        '.zip': '📦', '.tar': '📦', '.gz': '📦', '.7z': '📦',
        '.json': '{ }',
      };
      return iconMap[ ext ] ?? '📄';
    };

    /* ── 18. File size formatting ── */
    const formatSize = ( bytes ) => {
      if ( bytes < 1024 ) return `${ bytes } B`;
      if ( bytes < 1024 * 1024 ) return `${ ( bytes / 1024 ).toFixed( 1 ) } KB`;
      return `${ ( bytes / ( 1024 * 1024 ) ).toFixed( 1 ) } MB`;
    };

    /* ── 19. Build nested tree structure ── */
    const buildNestedTree = ( flatTree ) => {
      const root = { children: {} };

      for ( const item of flatTree ) {
        const parts = item.path.split( '/' );
        if ( parts.some( ( p ) => p.startsWith( '.' ) ) ) continue;

        let current = root;
        for ( let i = 0; i < parts.length; i++ ) {
          const part = parts[ i ];
          if ( !current.children[ part ] ) {
            current.children[ part ] = { children: {}, type: 'tree', path: parts.slice( 0, i + 1 ).join( '/' ) };
          }
          if ( i === parts.length - 1 ) {
            current.children[ part ].type = item.type;
            current.children[ part ].size = item.size;
            current.children[ part ].path = item.path;
          }
          current = current.children[ part ];
        }
      }

      return root;
    };

    /* ── 20. Sort tree children ── */
    const sortedEntries = ( children ) =>
      Object.entries( children ).sort( ( [ aName, aNode ], [ bName, bNode ] ) => {
        const aIsFolder = Object.keys( aNode.children ).length > 0 || aNode.type === 'tree';
        const bIsFolder = Object.keys( bNode.children ).length > 0 || bNode.type === 'tree';
        if ( aIsFolder && !bIsFolder ) return -1;
        if ( !aIsFolder && bIsFolder ) return 1;
        return aName.toLowerCase().localeCompare( bName.toLowerCase() );
      } );

    /* ── 21. Render a single node to HTML ── */
    const renderNode = ( name, node ) => {
      const isFolder = Object.keys( node.children ).length > 0 || ( node.type === 'tree' && Object.keys( node.children ).length === 0 );

      if ( isFolder ) {
        const childHTML = sortedEntries( node.children )
          .map( ( [ childName, childNode ] ) => renderNode( childName, childNode ) )
          .join( '' );
        return `<details data-folder-path="${ escapeHTML( node.path ) }">
  <summary class="tree-folder" tabindex="0" title="${ escapeHTML( node.path ) }">📁 <span class="folder-name">${ escapeHTML( name ) }</span></summary>
  ${ childHTML }
</details>`;
      }

      const icon = getFileIcon( name );
      const isReadme = /^readme/i.test( name );
      const nameHTML = isReadme
        ? `<strong>${ icon } ${ escapeHTML( name ) }</strong>`
        : `${ icon } ${ escapeHTML( name ) }`;
      const sizeHTML = node.size != null ? `<span class="tree-item-size">${ formatSize( node.size ) }</span>` : '';

      return `<div class="tree-item" tabindex="0" data-action="select-file" data-path="${ escapeHTML( node.path ) }" title="${ escapeHTML( node.path ) }">
  <span class="tree-item-name">${ nameHTML }</span>
  ${ sizeHTML }
</div>`;
    };

    /* ── 22. renderTree (batched) ── */
    const renderTree = ( treeArray ) => {
      const treeList = document.getElementById( 'treeList' );
      treeList.innerHTML = '';

      const nested = buildNestedTree( treeArray );
      const rootEntries = sortedEntries( nested.children );
      const BATCH_SIZE = 120;
      const totalBatches = Math.ceil( rootEntries.length / BATCH_SIZE );

      const statusEl = document.createElement( 'div' );
      statusEl.id = 'treeRenderStatus';
      statusEl.style.cssText = 'font-size:0.85rem;opacity:0.7;padding:0.3rem 0.5rem;';
      statusEl.textContent = '0% rendered…';
      treeList.appendChild( statusEl );

      return new Promise( ( resolve ) => {
        let batchIndex = 0;

        const renderBatch = () => {
          const start = batchIndex * BATCH_SIZE;
          const end = Math.min( start + BATCH_SIZE, rootEntries.length );
          const fragment = document.createDocumentFragment();
          const temp = document.createElement( 'div' );

          for ( let i = start; i < end; i++ ) {
            const [ name, node ] = rootEntries[ i ];
            temp.innerHTML = renderNode( name, node );
            while ( temp.firstChild ) fragment.appendChild( temp.firstChild );
          }

          treeList.appendChild( fragment );
          batchIndex++;

          const pct = Math.round( ( end / rootEntries.length ) * 100 );
          statusEl.textContent = `${ pct }% rendered…`;

          if ( batchIndex < totalBatches ) {
            setTimeout( renderBatch, 0 );
          } else {
            statusEl.remove();
            resolve();
          }
        };

        if ( rootEntries.length === 0 ) {
          statusEl.remove();
          treeList.innerHTML = '<p>No files found.</p>';
          resolve();
        } else {
          setTimeout( renderBatch, 0 );
        }
      } );
    };

    /* ── 23. fetchTree (Public API) ── */
    const fetchTree = async () => {
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      const treeList = document.getElementById( 'treeList' );

      try {
        if ( !state.branch ) {
          const repoRes = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`,
            { headers: getAuthHeaders(), signal }
          );
          updateRateBadge( repoRes );
          if ( !repoRes.ok ) throw new Error( `Repo fetch failed: ${ repoRes.status }` );
          const repoData = await repoRes.json();
          state.branch = repoData.default_branch;
        }

        const treeRes = await fetch(
          `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/git/trees/${ encodeURIComponent( state.branch ) }?recursive=1`,
          { headers: getAuthHeaders(), signal }
        );
        updateRateBadge( treeRes );

        if ( treeRes.status === 403 ) {
          treeList.innerHTML = '<p style="color:red;">Rate limited. Add a GitHub token for higher limits.</p>';
          return;
        }
        if ( !treeRes.ok ) throw new Error( `Tree fetch failed: ${ treeRes.status }` );

        const treeData = await treeRes.json();

        if ( treeData.truncated ) {
          const warning = document.createElement( 'div' );
          warning.style.cssText = 'background:#fff3cd;border:1px solid #ffc107;padding:0.5rem;border-radius:4px;margin-bottom:0.5rem;font-size:0.85rem;';
          warning.textContent = '⚠️ Repository tree is truncated. Some files may not appear.';
          treeList.innerHTML = '';
          treeList.appendChild( warning );
        }

        state.tree = treeData.tree;
        await renderTree( state.tree );

      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        treeList.innerHTML = `<p style="color:red;">${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── 24. Filter logic ── */
    const runFilter = () => {
      const query = document.getElementById( 'treeFilter' ).value.trim().toLowerCase();
      const treeList = document.getElementById( 'treeList' );
      const items = treeList.querySelectorAll( '.tree-item' );
      const folders = treeList.querySelectorAll( 'details' );

      if ( !query ) {
        items.forEach( ( el ) => { el.style.display = ''; } );
        folders.forEach( ( el ) => { el.style.display = ''; } );
        return;
      }

      items.forEach( ( el ) => {
        const path = ( el.dataset.path || '' ).toLowerCase();
        el.style.display = path.includes( query ) ? '' : 'none';
      } );

      const folderArr = Array.from( folders ).reverse();
      for ( const detail of folderArr ) {
        const hasVisible = detail.querySelector( '.tree-item:not([style*="display: none"])' ) ||
          detail.querySelector( 'details:not([style*="display: none"])' );
        if ( hasVisible ) {
          detail.style.display = '';
          detail.open = true;
        } else {
          detail.style.display = 'none';
        }
      }
    };

    let filterTimeout = null;
    const debouncedFilter = () => {
      clearTimeout( filterTimeout );
      filterTimeout = setTimeout( runFilter, 150 );
    };

    /* ── 25. setupTreeFilter ── */
    const setupTreeFilter = () => {
      const treeFilter = document.getElementById( 'treeFilter' );
      const btnFilterClear = document.getElementById( 'btnFilterClear' );

      treeFilter.addEventListener( 'input', () => {
        btnFilterClear.style.display = treeFilter.value ? 'block' : 'none';
        debouncedFilter();
      } );

      btnFilterClear.addEventListener( 'click', () => {
        treeFilter.value = '';
        btnFilterClear.style.display = 'none';
        runFilter();
        treeFilter.focus();
      } );
    };

    /* ── 26. Expand All / Collapse All ── */
    const setupExpandAll = () => {
      const btn = document.getElementById( 'btnExpandAll' );
      btn.style.display = '';
      let expanded = false;

      btn.addEventListener( 'click', () => {
        const allDetails = document.getElementById( 'treeList' ).querySelectorAll( 'details' );
        expanded = !expanded;
        allDetails.forEach( ( d ) => { d.open = expanded; } );
        btn.textContent = expanded ? 'Collapse All' : 'Expand All';
      } );
    };

    /* ── 27. Keyboard navigation ── */
    const getVisibleTreeItems = () => {
      const treeList = document.getElementById( 'treeList' );
      const all = treeList.querySelectorAll( '.tree-folder, .tree-item' );
      return Array.from( all ).filter( ( el ) => {
        if ( el.style.display === 'none' ) return false;
        const isSummary = el.classList.contains( 'tree-folder' );
        const ownDetails = isSummary ? el.parentElement : null;
        if ( isSummary && ownDetails?.style.display === 'none' ) return false;

        let ancestor = isSummary ? ownDetails?.parentElement : el.parentElement;
        while ( ancestor && ancestor !== treeList ) {
          if ( ancestor.style.display === 'none' ) return false;
          if ( ancestor.tagName === 'DETAILS' && !ancestor.open ) return false;
          ancestor = ancestor.parentElement;
        }
        return true;
      } );
    };

    const setupKeyboardNav = () => {
      document.addEventListener( 'keydown', ( e ) => {
        if ( e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' ) {
          e.preventDefault();
          document.getElementById( 'treeFilter' ).focus();
          return;
        }

        const treeList = document.getElementById( 'treeList' );
        if ( !treeList.contains( document.activeElement ) ) return;

        const el = document.activeElement;
        const isSummary = el.classList.contains( 'tree-folder' );
        const isItem = el.classList.contains( 'tree-item' );
        if ( !isSummary && !isItem ) return;

        const items = getVisibleTreeItems();
        const idx = items.indexOf( el );
        if ( idx === -1 ) return;

        switch ( e.key ) {
          case 'ArrowDown': {
            e.preventDefault();
            const next = items[ idx + 1 ];
            if ( next ) {
              next.focus();
              if ( next.classList.contains( 'tree-item' ) ) selectFile( next.dataset.path );
            }
            break;
          }
          case 'ArrowUp': {
            e.preventDefault();
            const prev = items[ idx - 1 ];
            if ( prev ) {
              prev.focus();
              if ( prev.classList.contains( 'tree-item' ) ) selectFile( prev.dataset.path );
            }
            break;
          }
          case 'Enter':
          case ' ': {
            e.preventDefault();
            if ( isSummary ) {
              el.parentElement.open = !el.parentElement.open;
            } else if ( isItem ) {
              selectFile( el.dataset.path );
            }
            break;
          }
          case 'ArrowRight': {
            e.preventDefault();
            if ( isSummary ) {
              const details = el.parentElement;
              if ( !details.open ) {
                details.open = true;
              } else {
                const firstChild = details.querySelector( ':scope > details > .tree-folder, :scope > .tree-item' );
                if ( firstChild ) {
                  firstChild.focus();
                  if ( firstChild.classList.contains( 'tree-item' ) ) selectFile( firstChild.dataset.path );
                }
              }
            }
            break;
          }
          case 'ArrowLeft': {
            e.preventDefault();
            if ( isSummary ) {
              const details = el.parentElement;
              if ( details.open ) {
                details.open = false;
              } else {
                const parentDetails = details.parentElement?.closest( 'details' );
                if ( parentDetails ) {
                  const parentSummary = parentDetails.querySelector( ':scope > .tree-folder' );
                  if ( parentSummary ) parentSummary.focus();
                }
              }
            } else {
              const parentDetails = el.closest( 'details' );
              if ( parentDetails ) {
                const parentSummary = parentDetails.querySelector( ':scope > .tree-folder' );
                if ( parentSummary ) parentSummary.focus();
              }
            }
            break;
          }
        }
      } );
    };

    /* ── 28. scrollToTreeFolder ── */
    const scrollToTreeFolder = ( folderPath ) => {
      const details = document.querySelector( `details[data-folder-path="${ CSS.escape( folderPath ) }"]` );
      if ( !details ) return;

      let ancestor = details.parentElement?.closest( 'details' );
      while ( ancestor ) {
        ancestor.open = true;
        ancestor = ancestor.parentElement?.closest( 'details' );
      }

      details.open = true;
      details.scrollIntoView( { block: 'center', behavior: 'smooth' } );
    };

    /* ── 29. Auto-open README ── */
    const autoOpenReadme = () => {
      if ( !state.tree ) return;

      const readme = state.tree.find( ( f ) =>
        f.type === 'blob' && /^readme\.(md|txt)$/i.test( f.path )
      ) ?? state.tree.find( ( f ) =>
        f.type === 'blob' && /readme\.(md|txt)$/i.test( f.path.split( '/' ).pop() )
      );

      if ( !readme ) return;

      const treeList = document.getElementById( 'treeList' );
      const item = treeList.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( readme.path ) }"]` );
      if ( item ) {
        selectFile( readme.path, { skipHash: true } );
        item.scrollIntoView( { block: 'center', behavior: 'smooth' } );
      }
    };

    /* ── 30. resetToHome ── */
    const resetToHome = () => {
      localStorage.removeItem( storageKey( 'lastFilePath' ) );
      state.currentFilePath = '';
      state.tree = null;
      try { history.replaceState( null, '', location.pathname + location.search ); } catch ( _ ) { /* file:// */ }
      fetchTree();
    };

    /* ── 31. GitHub SVG icon string ── */
    const GITHUB_SVG = `<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>`;

    /* ── 32. Build breadcrumbs ── */
    const buildBreadcrumbs = ( path ) => {
      const segments = path.split( '/' );
      const fileName = segments.pop();
      let html = `<a class="breadcrumb-link" data-action="reset-home" title="Go to repo root">${ escapeHTML( state.repo ) }</a>`;

      let folderPath = '';
      for ( const seg of segments ) {
        folderPath = folderPath ? folderPath + '/' + seg : seg;
        html += ` / <a class="breadcrumb-link" data-action="scroll-folder" data-folder="${ escapeHTML( folderPath ) }" title="${ escapeHTML( folderPath ) }">${ escapeHTML( seg ) }</a>`;
      }

      html += ` / <strong>${ escapeHTML( fileName ) }</strong>`;
      return html;
    };

    /* ── 33. Build file header ── */
    const buildFileHeader = ( path, ext ) => {
      const ghUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/blob/${ encodeURIComponent( state.branch ) }/${ path }`;
      const hasToggle = [ 'md', 'html', 'htm', 'svg' ].includes( ext );
      const hasCopy = !NO_COPY_EXTS.includes( ext );

      let actionsHTML = '';

      if ( hasToggle ) {
        const pref = getPreferredView( ext );
        const renderedOpacity = pref === 'rendered' ? '1' : '0.5';
        const rawOpacity = pref === 'raw' ? '1' : '0.5';
        actionsHTML += `<button class="file-btn" data-action="view-rendered" style="opacity:${ renderedOpacity }" title="Show rendered view">Rendered</button>`;
        actionsHTML += `<button class="file-btn" data-action="view-raw" style="opacity:${ rawOpacity }" title="Show raw source">Raw</button>`;
      }

      if ( hasCopy ) {
        actionsHTML += `<button class="file-btn" data-action="copy-file" title="Copy file content to clipboard">Copy</button>`;
      }

      actionsHTML += `<button class="file-btn" data-action="new-tab" data-path="${ escapeHTML( path ) }" title="Open in new tab">New Tab</button>`;

      return `<div class="panel-header file-header">
  <div class="file-title">
    <a href="${ escapeHTML( ghUrl ) }" target="_blank" title="View on GitHub">${ GITHUB_SVG }</a>
    <span id="breadcrumbs">${ buildBreadcrumbs( path ) }</span>
  </div>
  <div class="file-actions">${ actionsHTML }</div>
</div>`;
    };

    /* ── 34. GitHub Pages URL detection ── */
    const getNewTabUrl = async ( path ) => {
      if ( state.pagesEnabled === null ) {
        try {
          const res = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/pages`,
            { headers: getAuthHeaders() }
          );
          updateRateBadge( res );
          state.pagesEnabled = res.ok;
        } catch ( _ ) {
          state.pagesEnabled = false;
        }
      }

      if ( state.pagesEnabled ) {
        const isUserPage = state.repo.toLowerCase() === `${ state.owner.toLowerCase() }.github.io`;
        return isUserPage
          ? `https://${ state.owner }.github.io/${ path }`
          : `https://${ state.owner }.github.io/${ state.repo }/${ path }`;
      }

      return `https://raw.githubusercontent.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/${ encodeURIComponent( state.branch ) }/${ path }`;
    };

    /* ── 35. Fetch file text ── */
    const fetchFileText = async ( path, signal ) => {
      const token = getToken();
      if ( token ) {
        const headers = { ...getAuthHeaders(), Accept: 'application/vnd.github.raw+json' };
        const url = `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/contents/${ path }?ref=${ encodeURIComponent( state.branch ) }`;
        const res = await fetch( url, { headers, signal } );
        updateRateBadge( res );
        if ( !res.ok ) throw new Error( `Fetch failed: ${ res.status }` );
        return await res.text();
      }
      const url = `https://raw.githubusercontent.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/${ encodeURIComponent( state.branch ) }/${ path }`;
      const res = await fetch( url, { signal } );
      if ( !res.ok ) throw new Error( `Fetch failed: ${ res.status }` );
      return await res.text();
    };

    /* ── 36. Fetch file as blob ── */
    const fetchFileBlob = async ( path, signal ) => {
      const token = getToken();
      if ( token ) {
        const headers = { ...getAuthHeaders(), Accept: 'application/vnd.github.raw+json' };
        const url = `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/contents/${ path }?ref=${ encodeURIComponent( state.branch ) }`;
        const res = await fetch( url, { headers, signal } );
        updateRateBadge( res );
        if ( !res.ok ) throw new Error( `Fetch failed: ${ res.status }` );
        return await res.blob();
      }
      const url = `https://raw.githubusercontent.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/${ encodeURIComponent( state.branch ) }/${ path }`;
      const res = await fetch( url, { signal } );
      if ( !res.ok ) throw new Error( `Fetch failed: ${ res.status }` );
      return await res.blob();
    };

    /* ── 37. Get raw URL (no token) ── */
    const getRawUrl = ( path ) =>
      `https://raw.githubusercontent.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/${ encodeURIComponent( state.branch ) }/${ path }`;

    /* ── 38. Create blob URL helper ── */
    const createBlobUrl = ( blob ) => {
      const url = URL.createObjectURL( blob );
      activeBlobUrls.add( url );
      return url;
    };

    /* ── 39. Revoke active blob URLs ── */
    const revokeActiveBlobUrls = () => {
      activeBlobUrls.forEach( ( url ) => URL.revokeObjectURL( url ) );
      activeBlobUrls.clear();
    };

    /* ── 40. Render markdown ── */
    const renderMarkdown = ( text, path ) => {
      const ext = 'md';
      const pref = getPreferredView( ext );
      const renderedDisplay = pref === 'rendered' ? '' : 'none';
      const rawDisplay = pref === 'raw' ? '' : 'none';

      let renderedHTML;
      try {
        renderedHTML = marked.parse( text );
      } catch ( err ) {
        return `<div class="md-error">⚠️ Markdown rendering failed: ${ escapeHTML( err.message ) }</div><pre>${ escapeHTML( text ) }</pre>`;
      }

      const html = `<div class="markdown-body" id="viewRendered" style="display:${ renderedDisplay }">${ renderedHTML }</div><pre id="viewRaw" style="display:${ rawDisplay }">${ escapeHTML( text ) }</pre>`;
      return html;
    };

    /* ── 41. Rewrite markdown links ── */
    const rewriteMarkdownLinks = ( path ) => {
      const container = document.querySelector( '.markdown-body' );
      if ( !container ) return;

      const currentDir = path.includes( '/' ) ? path.substring( 0, path.lastIndexOf( '/' ) ) : '';
      const ghBlobPrefix = `github.com/${ state.owner }/${ state.repo }/blob/${ state.branch }/`;

      container.querySelectorAll( 'a' ).forEach( ( a ) => {
        const href = a.getAttribute( 'href' );
        if ( !href ) return;

        // Anchor links — leave as-is
        if ( href.startsWith( '#' ) ) return;

        // GitHub blob links
        const blobIdx = href.indexOf( ghBlobPrefix );
        if ( blobIdx !== -1 ) {
          const filePath = href.substring( blobIdx + ghBlobPrefix.length );
          a.removeAttribute( 'href' );
          a.style.cursor = 'pointer';
          a.style.color = 'var(--highlight-color)';
          a.addEventListener( 'click', ( e ) => {
            e.preventDefault();
            selectFile( decodeURIComponent( filePath ) );
          } );
          return;
        }

        // External links
        if ( href.startsWith( 'http://' ) || href.startsWith( 'https://' ) || href.startsWith( '//' ) ) {
          a.setAttribute( 'target', '_blank' );
          a.setAttribute( 'rel', 'noopener' );
          return;
        }

        // Relative paths
        const resolved = currentDir ? currentDir + '/' + href : href;
        const normalized = resolved.split( '/' ).reduce( ( acc, part ) => {
          if ( part === '..' ) acc.pop();
          else if ( part !== '.' && part !== '' ) acc.push( part );
          return acc;
        }, [] ).join( '/' );

        a.removeAttribute( 'href' );
        a.style.cursor = 'pointer';
        a.style.color = 'var(--highlight-color)';
        a.addEventListener( 'click', ( e ) => {
          e.preventDefault();
          selectFile( normalized );
        } );
      } );
    };

    /* ── 42. Render code / text ── */
    const renderCode = ( text, ext, fileSize ) => {
      const escaped = escapeHTML( text );
      if ( fileSize > 500000 ) {
        return `<pre><code>${ escaped }</code></pre>`;
      }
      return `<pre><code class="language-${ escapeHTML( ext ) }">${ escaped }</code></pre>`;
    };

    /* ── 43. Highlight code blocks ── */
    const highlightCode = ( fileSize ) => {
      if ( fileSize > 500000 ) return;
      const contentBody = document.getElementById( 'contentBody' );
      contentBody.querySelectorAll( 'pre code[class]' ).forEach( ( block ) => {
        hljs.highlightElement( block );
      } );
    };

    /* ── 44. Render HTML preview ── */
    const renderHTMLPreview = ( text, path ) => {
      const ext = path.split( '.' ).pop().toLowerCase();
      const pref = getPreferredView( ext );
      const renderedDisplay = pref === 'rendered' ? '' : 'none';
      const rawDisplay = pref === 'raw' ? '' : 'none';

      const blob = new Blob( [ text ], { type: 'text/html' } );
      const blobUrl = createBlobUrl( blob );

      return `<div id="viewRendered" style="display:${ renderedDisplay }"><iframe class="iframe-content" sandbox="allow-scripts" src="${ escapeHTML( blobUrl ) }"></iframe></div><pre id="viewRaw" style="display:${ rawDisplay }">${ escapeHTML( text ) }</pre>`;
    };

    /* ── 45. Render image ── */
    const renderImage = async ( path, ext, signal ) => {
      // Always blob-fetch: raw.githubusercontent.com serves text/plain, which
      // breaks <img> for SVGs (browser needs image/svg+xml MIME type).
      const blob = await fetchFileBlob( path, signal );

      if ( ext === 'svg' ) {
        // Re-wrap with correct MIME so the browser renders it
        const svgBlob = new Blob( [ blob ], { type: 'image/svg+xml' } );
        const url = createBlobUrl( svgBlob );
        const text = await blob.text();
        const pref = getPreferredView( 'svg' );
        const renderedDisplay = pref === 'rendered' ? '' : 'none';
        const rawDisplay = pref === 'raw' ? '' : 'none';
        return `<div id="viewRendered" style="display:${ renderedDisplay }"><img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( path ) }"></div><pre id="viewRaw" style="display:${ rawDisplay }">${ escapeHTML( text ) }</pre>`;
      }

      const url = createBlobUrl( blob );
      return `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( path ) }">`;
    };

    /* ── 46. Render audio ── */
    const renderAudio = async ( path, signal ) => {
      if ( getToken() ) {
        const blob = await fetchFileBlob( path, signal );
        const url = createBlobUrl( blob );
        return `<audio controls class="media-content" src="${ escapeHTML( url ) }"></audio>`;
      }
      const url = getRawUrl( path );
      return `<audio controls class="media-content" src="${ escapeHTML( url ) }"></audio>`;
    };

    /* ── 47. Render video ── */
    const renderVideo = async ( path, signal ) => {
      if ( getToken() ) {
        const blob = await fetchFileBlob( path, signal );
        const url = createBlobUrl( blob );
        return `<video controls class="media-content" src="${ escapeHTML( url ) }"></video>`;
      }
      const url = getRawUrl( path );
      return `<video controls class="media-content" src="${ escapeHTML( url ) }"></video>`;
    };

    /* ── 48. Render PDF ── */
    const renderPDF = async ( path, signal ) => {
      // Always blob-fetch: raw.githubusercontent.com serves text/plain, and
      // Google Docs Viewer is unreliable. Blob URL with correct MIME works everywhere.
      const blob = await fetchFileBlob( path, signal );
      const pdfBlob = new Blob( [ blob ], { type: 'application/pdf' } );
      const url = createBlobUrl( pdfBlob );
      return `<iframe class="iframe-content" src="${ escapeHTML( url ) }"></iframe>`;
    };

    /* ── 49. Render spreadsheet ── */
    const renderSpreadsheet = async ( path, signal ) => {
      const blob = await fetchFileBlob( path, signal );
      const data = await blob.arrayBuffer();
      const workbook = XLSX.read( data, { type: 'array' } );

      let html = '';
      for ( const sheetName of workbook.SheetNames ) {
        const sheetHTML = XLSX.utils.sheet_to_html( workbook.Sheets[ sheetName ] );
        html += `<div class="xlsx-sheet"><h3>${ escapeHTML( sheetName ) }</h3>${ sheetHTML }</div>`;
      }

      return DOMPurify.sanitize( html );
    };

    /* ── 50. Hash routing ── */
    const updateHash = ( path ) => {
      try {
        history.pushState( null, '', '#' + encodeURIComponent( path ) );
      } catch ( _ ) { /* file:// */ }
    };

    const handleHashChange = async () => {
      const hash = location.hash.slice( 1 );
      if ( !hash ) return;
      const path = decodeURIComponent( hash );

      if ( !state.tree ) {
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();
      }

      const found = state.tree?.find( ( item ) => item.path === path && item.type === 'blob' );
      if ( found ) {
        selectFile( path, { skipHash: true } );
      } else {
        document.getElementById( 'contentBody' ).innerHTML =
          '<p>File not found: <code>' + escapeHTML( path ) + '</code></p>';
      }
    };

    /* ── 51. selectFile — main content loader ── */
    const selectFile = async ( path, { skipHash = false } = {} ) => {
      // 1. Abort in-flight fetch
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      // Revoke previous blob URLs
      revokeActiveBlobUrls();

      // 2. Look up file in tree
      const treeItem = state.tree?.find( ( f ) => f.path === path && f.type === 'blob' );
      const fileSize = treeItem?.size ?? 0;

      // 3. Extension
      const ext = path.includes( '.' ) ? path.split( '.' ).pop().toLowerCase() : '';

      // 4. Large file protection (skip for streamable)
      if ( fileSize > LARGE_FILE_WARNING_BYTES && !STREAMABLE_EXTS.includes( ext ) && !approvedLargeFiles.has( path ) ) {
        const sizeMB = ( fileSize / ( 1024 * 1024 ) ).toFixed( 1 );
        if ( !window.confirm( `This file is ${ sizeMB } MB. Load anyway?` ) ) return;
        approvedLargeFiles.add( path );
      }

      // 5. Update state
      state.currentFilePath = path;

      // 6. Build file header
      const contentArea = document.getElementById( 'contentArea' );
      const existingHeader = contentArea.querySelector( '.panel-header.file-header' );
      const newHeader = document.createElement( 'div' );
      newHeader.innerHTML = buildFileHeader( path, ext );
      const headerEl = newHeader.firstElementChild;
      if ( existingHeader ) {
        existingHeader.replaceWith( headerEl );
      } else {
        contentArea.insertBefore( headerEl, contentArea.firstChild );
      }

      // 7. Show loading
      const contentBody = document.getElementById( 'contentBody' );
      contentBody.innerHTML = '<p>Loading…</p>';

      try {
        // 8. Render based on type
        if ( IMAGE_EXTS.includes( ext ) ) {
          contentBody.innerHTML = await renderImage( path, ext, signal );

        } else if ( AUDIO_EXTS.includes( ext ) ) {
          contentBody.innerHTML = await renderAudio( path, signal );

        } else if ( VIDEO_EXTS.includes( ext ) ) {
          contentBody.innerHTML = await renderVideo( path, signal );

        } else if ( ext === 'pdf' ) {
          contentBody.innerHTML = await renderPDF( path, signal );

        } else if ( SHEET_EXTS.includes( ext ) ) {
          contentBody.innerHTML = await renderSpreadsheet( path, signal );

        } else {
          // Text-based files
          let text = getCachedFileText( path );
          if ( text === null ) {
            text = await fetchFileText( path, signal );
            setCachedFileText( path, text );
          }

          if ( ext === 'md' ) {
            contentBody.innerHTML = renderMarkdown( text, path );
            rewriteMarkdownLinks( path );
          } else if ( ext === 'html' || ext === 'htm' ) {
            contentBody.innerHTML = renderHTMLPreview( text, path );
          } else {
            contentBody.innerHTML = renderCode( text, ext, fileSize );
            highlightCode( fileSize );
          }
        }
      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        contentBody.innerHTML = `<p style="color:red;">Error loading file: ${ escapeHTML( err.message ) }</p>`;
      }

      // 9. Update hash
      if ( !skipHash ) {
        updateHash( path );
      }

      // 10. Save last file path
      localStorage.setItem( storageKey( 'lastFilePath' ), path );

      // 11. Highlight active tree item
      const prev = document.querySelector( '.tree-item.active' );
      if ( prev ) prev.classList.remove( 'active' );
      const treeEl = document.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( path ) }"]` );
      if ( treeEl ) treeEl.classList.add( 'active' );

      // 12. Scroll content to top
      contentArea.scrollTo( { top: 0 } );
    };

    /* ── 52. File selection (event delegation on tree) ── */
    const setupFileSelection = () => {
      document.getElementById( 'treeList' ).addEventListener( 'click', ( e ) => {
        const target = e.target.closest( '[data-action="select-file"]' );
        if ( !target ) return;
        selectFile( target.dataset.path );
      } );
    };

    /* ── 53. Content area actions (event delegation) ── */
    const setupContentActions = () => {
      const contentArea = document.getElementById( 'contentArea' );

      contentArea.addEventListener( 'click', ( e ) => {
        // Breadcrumb: scroll to folder
        const scrollLink = e.target.closest( '[data-action="scroll-folder"]' );
        if ( scrollLink ) {
          scrollToTreeFolder( scrollLink.dataset.folder );
          return;
        }

        // Breadcrumb: reset to home
        const homeLink = e.target.closest( '[data-action="reset-home"]' );
        if ( homeLink ) {
          resetToHome();
          return;
        }

        // View toggle: rendered
        const renderedBtn = e.target.closest( '[data-action="view-rendered"]' );
        if ( renderedBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          if ( viewRendered ) viewRendered.style.display = '';
          if ( viewRaw ) viewRaw.style.display = 'none';
          renderedBtn.style.opacity = '1';
          const rawBtn = contentArea.querySelector( '[data-action="view-raw"]' );
          if ( rawBtn ) rawBtn.style.opacity = '0.5';
          const ext = state.currentFilePath.includes( '.' ) ? state.currentFilePath.split( '.' ).pop().toLowerCase() : '';
          setPreferredView( ext, 'rendered' );
          return;
        }

        // View toggle: raw
        const rawBtn = e.target.closest( '[data-action="view-raw"]' );
        if ( rawBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          if ( viewRendered ) viewRendered.style.display = 'none';
          if ( viewRaw ) viewRaw.style.display = '';
          rawBtn.style.opacity = '1';
          const rendBtn = contentArea.querySelector( '[data-action="view-rendered"]' );
          if ( rendBtn ) rendBtn.style.opacity = '0.5';
          const ext = state.currentFilePath.includes( '.' ) ? state.currentFilePath.split( '.' ).pop().toLowerCase() : '';
          setPreferredView( ext, 'raw' );
          return;
        }

        // Copy button
        const copyBtn = e.target.closest( '[data-action="copy-file"]' );
        if ( copyBtn ) {
          const cached = getCachedFileText( state.currentFilePath );
          if ( cached !== null ) {
            navigator.clipboard.writeText( cached ).then( () => {
              const original = copyBtn.textContent;
              copyBtn.textContent = '✓ Copied';
              setTimeout( () => { copyBtn.textContent = original; }, 1500 );
            } );
          }
          return;
        }

        // New Tab button
        const newTabBtn = e.target.closest( '[data-action="new-tab"]' );
        if ( newTabBtn ) {
          const filePath = newTabBtn.dataset.path;
          getNewTabUrl( filePath ).then( ( url ) => {
            window.open( url, '_blank' );
          } );
          return;
        }
      } );
    };

    /* ── 54. Global error handlers ── */
    window.addEventListener( 'error', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<strong>Error:</strong> ${ escapeHTML( event.message || 'Unknown error' ) }<br><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    window.addEventListener( 'unhandledrejection', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<strong>Unhandled error:</strong> ${ escapeHTML( event.reason?.message || String( event.reason ) || 'Unknown error' ) }<br><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    /* ── 55. init ── */
    const init = async () => {
      initAppearance();
      setupListeners();
      setupExpandAll();
      setupFileSelection();
      setupContentActions();
      restoreFileCache();

      window.addEventListener( 'popstate', handleHashChange );
      window.addEventListener( 'hashchange', handleHashChange );

      await detectRepo();

      state.owner = CONFIG.owner;
      state.repo = CONFIG.repo;
      state.branch = CONFIG.branch;

      if ( state.owner && state.repo ) {
        updateHeaderFromConfig();
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();

        if ( location.hash.length > 1 ) {
          await handleHashChange();
        } else {
          const lastPath = localStorage.getItem( storageKey( 'lastFilePath' ) );
          if ( lastPath ) {
            selectFile( lastPath, { skipHash: false } );
          } else {
            autoOpenReadme();
          }
        }

        setupTreeFilter();
        setupKeyboardNav();
      }
    };

    init();
  </script>
</body>

</html>
